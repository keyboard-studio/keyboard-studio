# CI — typecheck / test / build for the monorepo. See #2.
# Minimal-by-design: matches what `pnpm test`/`pnpm build` do locally.
# Extend later (lint, coverage, matrix across Node versions) as the
# package set grows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version comes from package.json "packageManager" (pnpm@9.12.0).
        # Don't also set `version` here -- action-setup@v4 errors on a conflict.
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch kmcmplib (prod)
        run: pnpm run fetch-kmcmplib
        env:
          KEYBOARD_STUDIO_KMCMPLIB_SOURCE: prod

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Test (all packages)
        run: pnpm -r test

      - name: Build (all packages)
        run: pnpm -r build
