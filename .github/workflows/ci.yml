# CI — typecheck / lint / test / build for the monorepo. See #2.
# Minimal-by-design: matches what `pnpm test`/`pnpm build`/`pnpm lint` do locally.
# Extend later (coverage, matrix across Node versions) as the package set grows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version comes from package.json "packageManager" (pnpm@9.12.0).
        # Don't also set `version` here -- action-setup@v4 errors on a conflict.
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build before typecheck — engine/studio depend on contracts'
      # dist/*.d.ts at type-resolution time. Without this, downstream
      # typechecks fail with "Cannot find module '@keyboard-studio/contracts'"
      # and trigger cascade errors (e.g. switch-exhaustiveness loss
      # because LintFinding["severity"] degrades to any).
      - name: Build (all packages)
        run: pnpm -r build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Lint (eslint + depcruise + crew-lint + facet-lint)
        run: pnpm lint

      - name: Test (all packages)
        run: pnpm -r test

      # Non-blocking: warns in CI log and opens GitHub Issues for any spec
      # sections whose content changed since the last acknowledgement.
      # Never fails the build — drift is a backlog item, not a blocker.
      - name: Spec drift check
        continue-on-error: true
        run: node utilities/spec-trace/index.js check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_TRACE_REPO: ${{ github.repository }}
