# Keep the Keyman Summer project board's Status field in sync with issue/PR
# lifecycle, so phases stop drifting (the #236 / #156 "merged but stuck at
# In PR" problem).
#
# Two rules, deliberately conservative so they respect the CLAUDE.md issue-
# closure policy ("refs #N" = boxes still open, issue stays open on purpose):
#
#   * A PR that links an issue moves that issue to "In PR" (or "In progress"
#     while the PR is a draft). Links are found via closes/fixes/resolves/refs
#     #N in the title+body, and via the branch name (km/issue-NNN-...).
#   * An issue being *closed* moves it to "Done". Closing is the only
#     unambiguous done-signal: a `closes #N` merge closes the issue (GitHub
#     does that) which trips this rule; a `refs #N` merge leaves the issue
#     open, so it correctly stays "In PR" until a human closes it.
#
# Issues closed as "not planned" are left untouched (there is no Cancelled
# column — don't mark abandoned work Done).
#
# TOKEN: GITHUB_TOKEN cannot write to user/org Projects v2. This needs a PAT
# stored as the repo secret PROJECT_SYNC_TOKEN, owned by someone with write
# access to the Keyman Summer project:
#   * classic PAT with scopes: project, repo, or
#   * fine-grained PAT with: Projects read+write, Issues read, Pull requests read.

name: Sync project board status

on:
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft]
  issues:
    types: [closed]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_SYNC_TOKEN }}
          script: |
            // Keyman Summer board — stable node IDs (see `gh project field-list`).
            const PROJECT_ID = 'PVT_kwHOAA8M484BZV8s';
            const STATUS_FIELD_ID = 'PVTSSF_lAHOAA8M484BZV8szhUVOyY';
            const STATUS = {
              'In progress': '47fc9ee4',
              'In PR':       '6435b7d2',
              'Done':        '98236657',
            };

            const { owner, repo } = context.repo;

            // Set the board Status for an issue, if it's on the board.
            async function setStatus(num, label) {
              const q = `query($owner:String!,$repo:String!,$num:Int!){
                repository(owner:$owner,name:$repo){
                  issue(number:$num){
                    projectItems(first:20){ nodes { id project { id } } }
                  }
                }
              }`;
              const res = await github.graphql(q, { owner, repo, num });
              const issue = res.repository.issue;
              if (!issue) { core.info(`#${num}: not found, skipping`); return; }
              const item = issue.projectItems.nodes.find(n => n.project.id === PROJECT_ID);
              if (!item) { core.info(`#${num}: not on the board, skipping`); return; }
              await github.graphql(`mutation($p:ID!,$i:ID!,$f:ID!,$o:String!){
                updateProjectV2ItemFieldValue(input:{
                  projectId:$p, itemId:$i, fieldId:$f,
                  value:{ singleSelectOptionId:$o }
                }){ projectV2Item { id } }
              }`, { p: PROJECT_ID, i: item.id, f: STATUS_FIELD_ID, o: STATUS[label] });
              core.info(`#${num} -> ${label}`);
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              if (issue.state_reason === 'not_planned') {
                core.info(`#${issue.number}: closed as not planned, leaving board untouched`);
                return;
              }
              await setStatus(issue.number, 'Done');
              return;
            }

            // pull_request event
            const pr = context.payload.pull_request;
            const action = context.payload.action;
            const goingToDraft = action === 'converted_to_draft' || (action === 'opened' && pr.draft);
            const label = goingToDraft ? 'In progress' : 'In PR';

            // Collect linked issue numbers from title+body keywords and the branch.
            const nums = new Set();
            const text = `${pr.title}\n${pr.body || ''}`;
            const kw = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?|refs?|references?)\b[:\s-]*#(\d+)/gi;
            let m;
            while ((m = kw.exec(text))) nums.add(Number(m[1]));
            const branch = (pr.head && pr.head.ref || '').match(/issue-(\d+)/i);
            if (branch) nums.add(Number(branch[1]));

            if (!nums.size) { core.info('No linked issue found in title/body/branch'); return; }
            for (const num of nums) await setStatus(num, label);
