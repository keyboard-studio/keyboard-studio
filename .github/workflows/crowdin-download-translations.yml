# Crowdin Tier A `download translations` (spec 046 T038). Scheduled half of
# the round-trip: pulls whatever translators have completed in the Crowdin
# project for packages/studio/src/locales/*/messages.json, pushes to a
# dedicated branch, and opens a PR against main. That PR goes through the
# normal merge gate (CI + km-triage/review) like any other PR -- the
# `chore(process):` title is a deliberate opt-in to the triage's pre-approved
# process-only bypass (see .claude/agents/km-triage skill, Pre-filter D), since
# a translated-value-only diff has no code surface for the review crew to
# examine.
#
# Trigger is a daily cron. A true webhook (Crowdin project settings calling
# this repo the moment a translation completes) is a Crowdin-side integration
# outside this repo's config; add a repository_dispatch trigger here if that
# gets wired up later. workflow_dispatch covers on-demand runs meanwhile.
#
# Requires the repo setting "Allow GitHub Actions to create and approve pull
# requests" (Settings > Actions > General) -- the job's own contents/pull-
# requests write permissions aren't sufficient without it.

name: Crowdin download translations

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: false
          upload_translations: false
          download_translations: true
          push_translations: true
          skip_untranslated_strings: false
          create_pull_request: true
          localization_branch_name: l10n_crowdin_action
          pull_request_title: "chore(process): sync Crowdin translations"
          pull_request_body: "Automated translation sync from the Crowdin project (Tier A studio UI catalog). Generated by crowdin-download-translations.yml (spec 046 T038)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
