<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Keyboard Studio — OSK frame</title>
    <!--
      [SCAFFOLD] Inline OSK pattern using KMW's InlinedOSKView. Adapted from
      Keyman Developer's debug-host
      (keyman/developer/src/server/src/site/{index.html,test.js}).

      [TEMP] KMW resources loaded from hardcoded CDN URL:
        https://s.keyman.com/kmw/engine/18.0.245/
      Replace with a versioned, CSP-safe asset path once the production
      delivery model is decided.

      Behaviour (font/CSS injection, postMessage contract, origin checks) now
      lives in osk-frame.js — kept as an external file (rather than an inline
      script) so script-src below can allowlist 'self' without 'unsafe-inline'
      or a churn-prone script hash.
    -->
    <!--
      Content-Security-Policy: resource-loading directives only.
      frame-ancestors CANNOT be expressed in a meta tag (spec requirement) —
      framing protection is instead served as an HTTP header from
      vercel.json (prod) / vite.config.ts (dev).

        script-src 'self' blob:   — this frame's own script + none else. No
                                    'unsafe-inline'/'unsafe-eval': KMW loads
                                    keyboards via <script src> element
                                    injection, never fetch+eval.
        style-src  ... 'unsafe-inline' blob: https://s.keyman.com
                                  — KMW sets element.style / injects <style>
                                    directly (unsafe-inline required
                                    regardless); blob: for injectFontFace /
                                    injectKeyboardCss; s.keyman.com serves the
                                    vendored KMW engine's OSK CSS.
        font-src   ... blob: data: https://s.keyman.com
                                  — blob:/data: for studio-supplied custom
                                    fonts (.kvks fontname); s.keyman.com for
                                    KMW's own OSK font (keymanweb-osk.ttf).
        img-src    ... data: https://s.keyman.com
                                  — s.keyman.com's CSS may reference icons;
                                    kept even though no direct <img> load was
                                    found statically (CSS-loaded assets
                                    aren't enumerable by inspection alone).
        connect-src 'self'        — no XHR/fetch anywhere in the KMW bundle;
                                    the api.keyman.com cloud path is dormant
                                    (frame always supplies a local language
                                    stub) so it is intentionally omitted.
        worker-src blob:           — KMW's LMLayer can spin up a blob: Worker;
                                    kept defensively though likely unreachable
                                    with attachType:"manual" and no model.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline' blob: https://s.keyman.com; font-src 'self' blob: data: https://s.keyman.com; img-src 'self' data: https://s.keyman.com; connect-src 'self'; worker-src blob:"
    />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: #14191f;
        color: #e6edf3;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #osk-target {
        width: 100%;
        min-height: 80px;
        font-size: 20px;
        padding: 10px;
        border: 1px solid #283040;
        background: #0d1117;
        color: #e6edf3;
        border-radius: 8px;
        resize: vertical;
        outline: none;
      }
      #osk-target:focus { border-color: #6ea8fe; box-shadow: 0 0 0 2px rgba(110,168,254,0.25); }
      #status {
        font-size: 12px;
        color: #9aa7b8;
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      }
      /* The inline OSK host — derived from Keyman Developer's test.css. */
      #osk-host-frame {
        width: 100%;
        background: #1c2230;
        border: 1px solid #283040;
        border-radius: 8px;
        padding: 8px;
        display: flex;
        justify-content: center;
        overflow: hidden;
      }
      #osk-host {
        width: 100%;
        min-height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Mobile/Pixel5 frame styling. */
      #osk-host-frame.Pixel5 {
        background: #0a0a0a;
        border-radius: 24px;
        padding: 24px 16px;
      }
      #osk-host-frame.Pixel5 #osk-host {
        background: #fff;
        border-radius: 4px;
        min-height: 320px;
      }
      .kmw-osk-frame { box-shadow: none !important; }
    </style>
  </head>
  <body class="osk-always-visible">
    <textarea id="osk-target" autofocus placeholder="Pick a keyboard, then type here..."></textarea>
    <div id="status">booting KeymanWeb...</div>
    <div id="osk-host-frame" class="Windows">
      <div id="osk-host">
        <!-- InlinedOSKView lives here. -->
      </div>
    </div>

    <script src="/osk-frame.js"></script>
  </body>
</html>
