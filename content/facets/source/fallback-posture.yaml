# source.fallback-posture — whether the chosen base's .kmn rules cover every
# physical key itself, or leaves keys unruled so they fall through to
# whatever physical/OS layout is actually active at runtime (not read from
# any .kmn store — see derivations notes below).
# Desktop-only: base-layout fall-through has no touch-layout counterpart.

id: source.fallback-posture
family: source
title: Source fallback posture
description: >
  Whether the chosen base .kmn rules every physical key itself, leaves some
  keys unruled so they fall through to whatever OS layout the user actually
  has active at runtime, or mixes both across its rule groups. Read directly
  from the base, before adaptation — a strong prior for whether the adapted
  keyboard will inherit unhandled-key gaps.

valueType: enum
values: [relies-on, blocks-comprehensively, mixed]

modality: physical
modalityNotes: >
  Base-layout fall-through is a desktop .kmn concept only; there is no
  touch-layout equivalent (touch layouts declare every key explicitly).

derivations:
  - kind: computed
    source: "planned:fallback-posture-of-kmn"
    sourceStatus: planned
    notes: >
      Counts explicitly-ruled physical keys (including `[K_x] > nul` blocks)
      against the keyboard's declared key range to decide whether unruled
      keys are the common case (relies-on) or the exception
      (blocks-comprehensively). &baselayout is not read: it is a
      conditional-test predicate for branching a rule per detected
      physical/OS layout, not a declared fallback source, and the actual
      fall-through target — whatever OS layout is active at runtime — is
      not expressed anywhere in the .kmn.

consumers:
  prefills: []
  proposes:
    - "axis:fallback-block"
    - "transform-offer:fallback-block"

provenanceLabel: "how completely your source keyboard covers the keyboard, vs falling back to the OS layout"

status: candidate
metrics:
  predictiveLift: null
  discrimination: null
  elicitationCost: computed

notes: >
  Desktop-only per modalityNotes; does not read &baselayout (see
  derivations notes).

transformImpactClass: ux-changing
houseTargetPolicy:
  inputs: [script]
  rules:
    - when: "script != Latn"
      target: blocks-comprehensively
    - when: default
      target: relies-on
invertibility: one-way
implications: >
  Moving from relies-on to blocks-comprehensively changes what happens when
  the typist presses a key the base never ruled: instead of falling through
  to the OS layout's own output, the adapted keyboard now produces its own
  (possibly blank) output for that key.
exceptionSites: []
causePredicates: []
