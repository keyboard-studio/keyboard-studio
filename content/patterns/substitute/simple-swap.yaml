# simple-swap.yaml
# Simple one-to-one character substitution
# Strategy: S-01 (Simple swap)
# Priority 1 — the simplest pattern; used only for tiny additions.

id: simple_swap
title: "Simple swap: keystroke → single character"
description: >
  Map 1–5 new characters onto unused keys. Each keystroke produces exactly one
  character. No deadkeys, no deadkey followup sequences, no diacritics, no case
  variants. Straight substitution.
category: substitute
appliesTo: ~
priority: 1
group_visibility: all
strategyId: "S-01"
combinesWith: []

questions:
  - id: keystrokeCharacterMap
    prompt: >
      Map each keystroke to the character it produces.
      Format: one entry per line, comma-separated: keystroke,unicode_codepoint

      Keystroke format:
        [K_X]           — unmodified key (where X is the virtual key name)
        [SHIFT K_X]     — with Shift
        [RALT K_X]      — with RAlt/AltGr
        [CTRL K_X]      — with Ctrl

      Example for Akan (adds ɛ and ɔ):
        [K_Q],U+025B
        [K_C],U+0254
        [SHIFT K_Q],U+0190
        [SHIFT K_C],U+0186

      Find Unicode codepoints at unicode.org or in the spec appendix.
    answerType: text

  - id: characterDescriptions
    prompt: >
      For each character you're adding, provide a brief description for the user.
      Format: character,description

      Example:
        ɛ,Latin small letter open e (like the 'e' in 'met')
        ɔ,Latin small letter open o (like the 'o' in 'dog')

      These descriptions appear in the help docs and on-screen hints.
    answerType: text
    required: false

kmnFragment: |
  c Simple character substitution (S-01)
  c Each keystroke maps to exactly one character.
  c No deadkeys, no combining, no case variants.

  begin Unicode > use(main)

  group(main) using keys
  {{kmnRules}}

touchLayoutFragment: null

notes: >
  S-01 is the simplest possible strategy: one key = one character, no special handling.
  Use only when:
  - Total new characters ≤ 5
  - Each character has its own dedicated key (no sharing via modifiers)
  - No diacritics, combining marks, or case alternation
  - The user has unused keys available (not RAlt-only)

  When to NOT use S-01:
  - If you have more than ~5 characters → S-02 (deadkey composition) is often cleaner
  - If characters share a modifier + base pattern → S-05 (mnemonic spelling)
  - If any character combines with prior input → S-02, S-05, or S-07

tests:
  - input: ["[K_Q]"]
    expectedOutput: "ɛ"
    description: >
      Akan: pressing Q produces ɛ (Latin small letter open e)
  - input: ["[K_C]"]
    expectedOutput: "ɔ"
    description: >
      Akan: pressing C produces ɔ (Latin small letter open o)
  - input: ["[SHIFT K_Q]"]
    expectedOutput: "Ɛ"
    description: >
      Akan: pressing Shift+Q produces Ɛ (uppercase)

validatedForFamilies: ["Latn"]
sourceKeyboards:
  - "release/a/akan/source/akan.kmn"
reviewedBy: "keyboard-studio-content-team"
reviewDate: "2026-06-05"

# ---------------------------------------------------------------------------
# Extended metadata — YAML-only; not part of the TypeScript Pattern interface
# ---------------------------------------------------------------------------

frequency_in_corpus: "Minimal; only languages with <5 new characters and unused keys"

notes_extended: >
  Simple swap is the fallback for tiny, phonetically-straightforward additions.
  It is rarely the right choice because most keyboards need more than 5 characters,
  or the characters are easier typed via deadkeys or sequences.

  **Why S-01 is rarely used:**
  Most languages have either (1) more than 5 new characters (→ S-02/S-05), or
  (2) unused keys are precious and reserved for future growth (→ deadkey is safer).
  S-01 is chosen only when both conditions hold: tiny inventory AND confident
  that no future additions are anticipated.

  **Akan exemplar analysis:**
  The Akan keyboard adds just two characters (ɛ and ɔ) to a base US layout.
  Both map to visually similar keys (q for open-e, c for open-o), both have
  case variants (Shift+Q → Ɛ, Shift+C → Ɔ), and the author had unused keys
  available. This is the canonical S-01 case.

provenance:
  - keyboard: "release/a/akan/source/akan.kmn"
    note: >
      Akan (Twi/Fante). Adds exactly ɛ and ɔ via simple key swaps.
      Lines 8–11: store(&VERSION), store(&NAME), store(&COPYRIGHT), store(&LANGUAGE).
      Lines 13–16: Simple rules mapping [K_Q] → ɛ, [K_C] → ɔ, and case variants.
      This keyboard is THE reference for S-01: minimal, clear, and exemplary.
      See spec.md §7.3 S-01 Simple swap for full context.

demo:
  filled_kmn: |
    c Simple swap demo: two new characters on unused keys
    c Akan adds ɛ (open-e) and ɔ (open-o) to a US base

    store(&VERSION) '10.0'
    store(&NAME) 'Simple Swap Demo'
    store(&TARGETS) 'any'

    begin Unicode > use(main)

    group(main) using keys
    c New characters on unused keys
    + [K_Q] > U+025B      c ɛ (open e)
    + [K_C] > U+0254      c ɔ (open o)

    c Case variants
    + [SHIFT K_Q] > U+0190   c Ɛ (open E)
    + [SHIFT K_C] > U+0186   c Ɔ (open O)

  sample_keys:
    - keys: ["K_Q"]
      output: "ɛ"
      note: "Q key produces ɛ"
    - keys: ["SHIFT K_Q"]
      output: "Ɛ"
      note: "Shift+Q produces uppercase Ɛ"
    - keys: ["K_C"]
      output: "ɔ"
      note: "C key produces ɔ"

  sample_output: >
    Type Q to get ɛ, or Shift+Q for Ɛ. Type C to get ɔ, or Shift+C for Ɔ.
    Each key produces exactly one character. No deadkeys, no sequences.

skeleton:
  kmn_template: |
    c Simple character substitution ({{language}})
    c {{sourceKeyboard}} pattern

    store(&VERSION) '10.0'
    store(&NAME) '{{keyboardName}}'
    store(&TARGETS) 'any'

    begin Unicode > use(main)

    group(main) using keys
    c New characters — one keystroke per character
    {{characterRules}}

  note: >
    Each rule follows the pattern: `+ [KEY] > U+XXXX` where KEY is a virtual key
    name (e.g., K_Q, K_C) and U+XXXX is the Unicode codepoint of the character.
    Include Shift variants if the language has uppercase forms of the characters.

  parameters:
    - id: language
      description: >
        Language name (e.g., "Akan", "Twi").
    - id: sourceKeyboard
      description: >
        Reference keyboard this pattern is based on.
        Example: release/a/akan/source/akan.kmn
    - id: keyboardName
      description: >
        Display name for the keyboard being authored.
        Example: "Akan Twi"
    - id: characterRules
      description: >
        One rule per character. Format (one per line):
        + [K_X] > U+XXXX   c description

        Example for Akan:
        + [K_Q] > U+025B   c ɛ open e
        + [K_C] > U+0254   c ɔ open o
        + [SHIFT K_Q] > U+0190   c Ɛ open E
        + [SHIFT K_C] > U+0186   c Ɔ open O
