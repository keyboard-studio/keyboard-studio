# indic-pre-base-vowel.yaml
# Reorder pattern for Indic pre-base vowel matras (Tamil and related scripts)
# Strategy: S-09 reorder (+ S-05 parallel-store lookup, S-04 atomic backspace)

id: indic_pre_base_vowel
title: "Pre-base vowel (vowel key before consonant)"
description: >
  Some vowels in Tamil (and several other Indic scripts) appear in front of
  the consonant on screen even though you type the consonant first, then the
  vowel. This is not a quirk of the keyboard — it is how the script works:
  the vowel sign belongs logically after the consonant in the stored text,
  and the rendering system places it visually to the left. This pattern stores
  the consonant and vowel in the correct Unicode order so the display comes
  out right without the keyboard author having to insert the vowel first or
  manipulate cursor position.
category: "reorder"
appliesTo:
  - "Taml"
  - "Mlym"
  - "Knda"
  - "Telu"
priority: 2
group_visibility: non-roman
strategyId: "S-09"
combinesWith:
  - "S-05"
  - "S-04"

questions:
  - id: keyboardName
    prompt: "What is the display name for this keyboard?"
    answerType: text

  - id: consonants
    prompt: >
      Enter the consonant characters this keyboard handles (one per slot,
      matching consonantKeys order).
    answerType: store-content

  - id: consonantKeys
    prompt: >
      Enter the key names that produce each consonant (matching consonants
      order).
    answerType: store-content

  - id: preBaseVowels
    prompt: >
      Enter the pre-base vowel matra characters (the ones that display before
      the consonant).
    answerType: store-content

  - id: preBaseVowelKey1
    prompt: "Which key triggers the first pre-base vowel?"
    answerType: key-name

  - id: preBaseVowel1
    prompt: "Enter the first pre-base vowel matra character (the one that displays to the left of the consonant)"
    answerType: char-single

kmnFragment: |
  store(&VERSION) '10.0'
  store(&NAME) '{{keyboardName}}'
  store(&KEYBOARDVERSION) '1.0'
  store(&TARGETS) 'any'

  c Parallel stores: consonant chars and their key assignments
  store(consonants)    {{consonants}}
  store(consonantKeys) {{consonantKeys}}

  c Pre-base vowel matras (one per vowel class)
  store(preBaseVowels) {{preBaseVowels}}

  begin Unicode > use(main)
  group(main) using keys

  c Each pre-base vowel gets a dead-key trigger
  + [{{preBaseVowelKey1}}] > dk(pbv1)

  c Dead-key + consonant key => consonant char + vowel matra
  dk(pbv1) + any(consonantKeys) > index(consonants, 2) {{preBaseVowel1}}

  c Atomic backspace: erase consonant + matra as a unit
  any(consonants) {{preBaseVowel1}} + [K_BKSP] > nul

  c Fallback: consonant keys without a preceding dead-key
  + any(consonantKeys) > index(consonants, 1)

reorderRules: null

touchLayoutFragment: null

tests:
  - input: ["K_B", "K_H"]
    expectedOutput: "கெ"
    description: "e_short + ka => கெ"
  - input: ["K_N", "K_H"]
    expectedOutput: "கே"
    description: "E_long + ka => கே"
  - input: ["K_I", "K_H"]
    expectedOutput: "கை"
    description: "ai + ka => கை"
  - input: ["K_I", "K_B"]
    expectedOutput: "னை"
    description: "ai + na => னை"
  - input: ["K_H"]
    expectedOutput: "க"
    description: "consonant alone"

validatedForFamilies:
  - "Taml"

sourceKeyboards:
  - "release/t/thamizha_new_typewriter"
  - "release/t/thamizha_bamini"

reviewedBy: "keyboard-studio-content-team"
reviewDate: "2026-06-11"

# ---------------------------------------------------------------------------
# Extended metadata — YAML-only; not part of the TypeScript Pattern interface
# ---------------------------------------------------------------------------

provenance:
  - keyboard: "thamizha_new_typewriter"
    path: "release/t/thamizha_new_typewriter"
    rule: "dk(e) + any (EstrL) > index (TstrL,2) U+0BC6"
    line: 101
    note: >
      Tamil New Typewriter layout (Mugunth, Umar, K. Sethu). Vowel key typed
      before consonant key using a dead-key; consonant extracted from parallel
      store; e-short matra (U+0BC6) appended. This is the canonical S-09 Tamil
      example: stored order is consonant + matra even though the vowel key is
      pressed first.
  - keyboard: "thamizha_bamini"
    path: "release/t/thamizha_bamini"
    rule: "dk(3)+ any(mey1) > index(meyr,2) U+0bc8"
    line: 170
    note: >
      Suratha Bamini layout (c) thamizha.com and SIL Global — originally the
      Sri Lankan Tamil typewriter layout. Uses integer dead-key names (dk(3)
      for ai-class vowel, dk(1) for e-short, dk(2) for E-long) rather than
      descriptive names, but the mechanism is identical: vowel key sets dead
      state, next consonant key triggers index() lookup + matra append.
      Confirms the pattern is not specific to a single keyboard implementation.

demo:
  filled_kmn: |
    store(&VERSION) '10.0'
    store(&NAME) 'Tamil Pre-Base Vowel Demo'
    store(&KEYBOARDVERSION) '1.0.0'
    store(&TARGETS) 'any'

    c 18 Tamil base consonants
    store(cons) U+0B95 U+0B99 U+0B9A U+0B9E U+0B9F U+0BA3 \
                U+0BA4 U+0BA8 U+0BAA U+0BAE U+0BAF U+0BB0 \
                U+0BB2 U+0BB5 U+0BB4 U+0BB3 U+0BB1 U+0BA9

    c Consonant keys (Tamil99 layout)
    store(consKeys) "hb[]opl;jk'mnv/yui"

    begin Unicode > use(main)

    group(main) using keys

    c Pre-base vowel dead-keys (vowel key typed BEFORE consonant key)
    + "b" > dk(e_short)
    + "n" > dk(E_long)
    + "i" > dk(ai)

    c Dead-key + consonant-key => consonant-char + vowel-matra
    dk(e_short) + any(consKeys) > index(cons, 2) U+0BC6
    dk(E_long)  + any(consKeys) > index(cons, 2) U+0BC7
    dk(ai)      + any(consKeys) > index(cons, 2) U+0BC8

    c Atomic backspace
    any(cons) U+0BC6 + [K_BKSP] > nul
    any(cons) U+0BC7 + [K_BKSP] > nul
    any(cons) U+0BC8 + [K_BKSP] > nul

    c Fallback consonant mappings
    + any(consKeys) > index(cons, 1)

skeleton:
  description: >
    Parameterize the consonant character store (consonants), the matching
    consonant key store (consonantKeys), and at least one pre-base vowel matra
    together with its trigger key. Add one dead-key trigger rule and one
    dead-key + any(consonantKeys) output rule per vowel class. Place all
    dead-key rules before the fallback any(consonantKeys) rule so the dead-key
    paths take priority. Atomic backspace (any(consonants) matra + K_BKSP > nul)
    should be added for each vowel class to prevent partial cluster deletion.
