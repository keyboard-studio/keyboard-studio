# indic-pre-base-vowel.yaml
# Reorder pattern for Indic scripts where a vowel sign appears visually BEFORE
# the consonant it attaches to, even though it is typed AFTER the consonant.
# Strategy: S-09 (Context-sensitive cluster formation)

id: indic_pre_base_vowel
title: "Pre-base vowel moves in front of consonant"
description: >
  Some vowel signs appear on screen to the LEFT of the consonant they belong
  to, even though you type the consonant first and the vowel second. This
  pattern accepts the natural typing order and places the vowel correctly in
  the stored text so it displays in the right position.
category: reorder
appliesTo: ["Deva", "Taml", "Beng", "Knda", "Mlym", "Orya", "Gujr", "Guru"]
priority: 2
group_visibility: non-roman
strategyId: "S-09"
combinesWith: []

questions:
  # Hunk 1: keep ours — char-list answerType is the right type for collecting
  # a character set; theirs' text/keystroke-map conflates vowel identity with
  # key assignment (which belongs in the KMN rules layer, not the survey).
  - id: preBaseVowels
    prompt: >
      Which vowel signs appear to the LEFT of the consonant on screen?
      Type them one after another without spaces.
      Example for Devanagari: ि (U+093F, i-matra)
      Example for Tamil: ி (U+0BBF) ெ (U+0BC6) ே (U+0BC7) ை (U+0BC8)
    answerType: char-list

  # Hunk 2: keep ours — adds the halant/virama question (required for
  # cluster-boundary reorder rules). Theirs omitted halant coverage entirely.
  - id: baseConsonants
    prompt: >
      Which consonants do these vowel signs attach to?
      Type the full range without spaces.
      Example for Devanagari: कखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह
    answerType: char-list

  - id: halant
    prompt: >
      What is the halant or virama character for this script — the mark that
      ends a consonant cluster?
      Example for Devanagari: ् (U+094D)
      Example for Tamil: ் (U+0BCD)
      Leave blank if your script does not use a virama.
    answerType: char-single
    required: false
    default: ""

# Hunk 3: keep theirs — canonical Unicode Indic encoding is C+V (consonant
# then vowel sign in the backing store). Theirs' context-rule approach
# produces that order. Ours' reorder(from(preBaseVowels) before(baseConsonants))
# inverts storage to V+C, which is non-canonical for Unicode-mode keyboards
# and contradicts how Unicode-mode Keyman Indic keyboards (common_devanagari,
# SIL Devanagari Phonetic) actually work.
kmnFragment: |
  c Pre-base vowel reordering: type consonant, then vowel key
  c The 'context' rule keeps the consonant and adds the vowel after it.
  c Indic script rendering engines automatically display the vowel to the left.

  store(preBaseVowels) '{{preBaseVowels}}'
  store(baseConsonants) '{{baseConsonants}}'

  begin Unicode > use(main)

  group(main) using keys
  c Pre-base vowel rules: consonant + vowel-key > consonant vowel-sign
  c (The rendering engine positions pre-base vowels visually to the left)
  {{kmnRules}}

reorderRules: |
  c Pre-base vowel context rules (KMN syntax)
  c Pattern: any(baseConsonants) + 'key' > context U+XXXX
  {{kmnRules}}

touchLayoutFragment: null

notes: >
  Pre-base vowel reordering uses KMN context rules, not a reorder statement
  (which is LDML-only and not supported in KMN source files). The `context`
  keyword in a rule output preserves the previously matched context stack and
  appends the new character. So when a rule fires `any(baseConsonants) + 'i' >
  context U+093F`, the consonant and vowel sign are both in the output buffer,
  but the Indic script rendering engine (in the OS or browser) automatically
  positions the pre-base vowel visually to the left of the consonant because
  that is where Unicode Indic rendering rules place it.

  This pattern is standard across Indic keyboards (Devanagari, Tamil, Bengali,
  etc.). Authors define one context rule per pre-base vowel sign, grouped in
  the same KMN group. There is no explicit reordering rule in the KMN source;
  the reordering is inherent to how the Unicode text is rendered.

# Post-resolution audit fix: the tests block was outside the conflict markers
# but still asserted V+C storage order, which would contradict the C+V kmnFragment
# now in place. Corrected to canonical C+V order so the descriptions match what
# the rule actually emits.
tests:
  - input: ["K_K", "U+093F"]
    expectedOutput: "कि"
    description: >
      Devanagari: type ka (क U+0915) then i-matra (ि U+093F) — stored as
      consonant THEN i-matra (U+0915 U+093F, canonical Unicode order); the
      rendering engine positions the i-matra visually to the left.
  - input: ["K_K", "U+0BBF"]
    expectedOutput: "கி"
    description: >
      Tamil: type ka (க U+0B95) then i-matra (ி U+0BBF) — stored as
      consonant THEN i-matra (U+0B95 U+0BBF, canonical Unicode order).
  - input: ["K_K", "U+09BF"]
    expectedOutput: "কি"
    description: >
      Bengali: type ka (ক U+0995) then i-matra (ি U+09BF) — stored as
      consonant THEN i-matra (U+0995 U+09BF, canonical Unicode order).

validatedForFamilies: ["Deva", "Taml", "Beng"]
sourceKeyboards:
  - "release/sil/sil_devanagari_phonetic"
  - "release/tamil/tamil99"
  - "release/sil/sil_bengali_national_jatiya"
reviewedBy: "keyboard-studio-content-team"
reviewDate: "2026-06-05"

# ---------------------------------------------------------------------------
# Extended metadata — YAML-only; not part of the TypeScript Pattern interface
# ---------------------------------------------------------------------------

frequency_in_corpus: "3/3 scanned Indic abugida keyboards require pre-base vowel reorder"

provenance:
  # Hunk 4: keep theirs — explicitly and correctly states the i-matra is
  # stored AFTER the consonant and rendered visually to the left.
  - keyboard: "release/c/common_devanagari/source/common_devanagari.kmn"
    note: >
      Common Devanagari keyboard for Hindi. Uses context rules to handle pre-base
      vowels: `any(ConsonG) + 'i' > context U+093F` (line 224). The i-matra
      (U+093F) is the canonical pre-base vowel: typed after the consonant via
      the 'i' key, it's stored after the consonant but rendered visually to the
      left. This is the primary S-09 exemplar cited in spec §7.3.
  # Hunk 5: keep theirs — context rules append the vowel after the consonant
  # (C+V correct); ours' V+C claim was incorrect for Unicode canonical Tamil.
  - keyboard: "release/tamil/tamil99/source/tamil99.kmn"
    note: >
      Tamil99 standard layout. Tamil has four pre-base vowels: ி (U+0BBF),
      ெ (U+0BC6), ே (U+0BC7), ை (U+0BC8). All four are typed after the consonant
      but rendered to its left using context rules that preserve the consonant and
      append the vowel sign. The rendering engine automatically positions each
      pre-base vowel visually to the left, matching the Unicode canonical order
      for Tamil syllables.
  # Hunk 6: keep theirs — same storage-order correction as hunk 5.
  - keyboard: "release/sil/sil_bengali_national_jatiya/source/sil_bengali_national_jatiya.kmn"
    note: >
      SIL Bengali National/Jatiya keyboard. Bengali i-matra (ি U+09BF) is a
      pre-base vowel sign with identical visual/typing-order inversion as
      Devanagari. Uses a context rule to preserve the consonant and append the
      vowel sign. Confirms the pattern generalises across the Bengali–Devanagari
      abugida family.

demo:
  # Hunk 7a: keep theirs for filled_kmn — context rule (C+V correct).
  filled_kmn: |
    c Demo: Devanagari pre-base i-matra reorder using context rules
    c Type any consonant, then 'i' to produce consonant + i-matra (U+093F)
    c The rendering engine displays the i-matra visually to the left of the consonant.

    store(&VERSION) '10.0'
    store(&NAME) 'Indic Pre-Base Vowel Demo'
    store(&TARGETS) 'any'

    store(baseConsonants) 'कखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह'

    begin Unicode > use(main)

    group(main) using keys
    c Pre-base vowel: 'i' key produces U+093F (i-matra)
    c Context rule preserves the consonant and appends the vowel sign
    any(baseConsonants) + 'i' > context U+093F

  # Post-resolution audit fix: sample_keys output was V+C ("ि​क" with ZWJ),
  # corrected to canonical C+V ("कि"). Keystrokes also normalised — type the
  # consonant key then the 'i' keystroke (matching the demo rule), not the
  # i-matra character directly.
  sample_keys:
    - keys: ["क", "i"]
      output: "कि"
      note: "ka + 'i' — stored as ka THEN i-matra (canonical C+V); i-matra renders visually to the left"
    - keys: ["ग", "i"]
      output: "गि"
      note: "ga + 'i' — stored as ga THEN i-matra (canonical C+V)"
    - keys: ["स", "i"]
      output: "सि"
      note: "sa + 'i' — stored as sa THEN i-matra (canonical C+V)"

  # Post-resolution audit fix: prose was "stored before the consonant", corrected
  # to "stored after the consonant" so it matches the canonical Unicode order
  # that the kmnFragment's context rule actually produces.
  sample_output: >
    Type any Devanagari consonant key followed by 'i' to produce the i-matra (ि).
    The vowel sign is stored AFTER the consonant in the text buffer (canonical
    Unicode order); the Indic shaping engine positions it visually to the left
    of the consonant — the correct appearance for Devanagari syllables such as
    कि (ka+i), गि (ga+i), सि (sa+i).

skeleton:
  # Hunk 7b: merge — theirs' context-rule template + ours' store(preBaseVowels)
  # declaration (the skeleton parameters reference preBaseVowels even though
  # theirs' rule body uses literal codepoints; the store is available for
  # alternative rule shapes during pattern instantiation).
  kmn_template: |
    store(preBaseVowels) '{{preBaseVowels}}'
    store(baseConsonants) '{{baseConsonants}}'

    begin Unicode > use(main)

    group(main) using keys
    c Pre-base vowel rules (one per vowel sign; repeat as needed)
    {{kmnRules}}

  note: >
    Each rule follows the pattern: `any(baseConsonants) + 'key' > context U+XXXX`
    where 'key' is the keystroke that produces the pre-base vowel, and U+XXXX is
    the Unicode codepoint for the vowel sign. The `context` keyword preserves the
    previously matched consonant and appends the vowel sign. The Indic script
    rendering engine automatically positions pre-base vowels visually to the left
    of the consonant.

  # Hunk 7c: keep ours' parameters — documents preBaseVowels, baseConsonants,
  # and halant. Halant is genuinely needed for cluster-aware extensions; theirs
  # documented kmnRules as a parameter but kmnRules is the rule-body output
  # produced from the other answers, not a survey input.
  parameters:
    - id: preBaseVowels
      description: >
        The vowel signs that must be stored before the consonant even though
        they are typed after it. In Devanagari this is ि (U+093F); in Tamil
        ி ெ ே ை (U+0BBF, U+0BC6, U+0BC7, U+0BC8); in Bengali ি (U+09BF).
        Provide all pre-base vowels for the target script as a plain string.
    - id: baseConsonants
      description: >
        The consonant characters that pre-base vowels attach to. Provide the
        full consonant inventory of the target script as a plain string so the
        reorder rule fires for every consonant+vowel pair.
    - id: halant
      description: >
        The virama or halant character that ends a consonant cluster
        (Devanagari ् U+094D, Tamil ் U+0BCD, Bengali ্ U+09CD). Used in
        extended reorder rules that handle consonant-cluster+vowel sequences.
        Optional — leave blank if your script does not use a virama.
