# indic-pre-base-vowel.yaml
# Reorder pattern for Indic scripts where a vowel sign appears visually BEFORE
# the consonant it attaches to, even though it is typed AFTER the consonant.
# Strategy: S-09 (Context-sensitive cluster formation)

id: indic_pre_base_vowel
title: "Pre-base vowel moves in front of consonant"
description: >
  Some vowel signs appear on screen to the LEFT of the consonant they belong
  to, even though you type the consonant first and the vowel second. This
  pattern accepts the natural typing order and places the vowel correctly in
  the stored text so it displays in the right position.
category: reorder
appliesTo: ["Deva", "Taml", "Beng", "Knda", "Mlym", "Orya", "Gujr", "Guru"]
priority: 2
group_visibility: non-roman
strategyId: "S-09"
combinesWith: []

questions:
  - id: preBaseVowelMap
    prompt: >
      For each pre-base vowel sign, what is the key/character that types it?
      Format: one line per vowel, comma-separated: keystroke,unicode_codepoint
      Example for Devanagari i-matra: i,U+093F
      Example for Tamil: (i,U+0BBF e,U+0BC6 E,U+0BC7 ai,U+0BC8)
    answerType: text

  - id: baseConsonants
    prompt: >
      Which consonants do these vowel signs attach to?
      Type the full range without spaces, or provide a store name.
      Example for Devanagari: कखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह
    answerType: char-list

questions_deprecated:
  - note: >
      The single-keystroke assumption allows the pattern to work generically
      across all Indic scripts. Some keyboards may parameterize differently
      (e.g., Tamil99 uses 'e' → U+0BC6, while another may use two keystrokes).
      For multi-keystroke pre-base vowels, define them in the question text.

kmnFragment: |
  c Pre-base vowel reordering: type consonant, then vowel key
  c The 'context' rule keeps the consonant and adds the vowel after it.
  c Indic script rendering engines automatically display the vowel to the left.

  store(baseConsonants) '{{baseConsonants}}'

  begin Unicode > use(main)

  group(main) using keys
  c Pre-base vowel rules: consonant + vowel-key > consonant vowel-sign
  c (The rendering engine positions pre-base vowels visually to the left)
  {{kmnRules}}

reorderRules: |
  c Pre-base vowel context rules (KMN syntax)
  c Pattern: any(baseConsonants) + 'key' > context U+XXXX
  {{kmnRules}}

touchLayoutFragment: null

notes: >
  Pre-base vowel reordering uses KMN context rules, not a reorder statement
  (which is LDML-only and not supported in KMN source files). The `context`
  keyword in a rule output preserves the previously matched context stack and
  appends the new character. So when a rule fires `any(baseConsonants) + 'i' >
  context U+093F`, the consonant and vowel sign are both in the output buffer,
  but the Indic script rendering engine (in the OS or browser) automatically
  positions the pre-base vowel visually to the left of the consonant because
  that is where Unicode Indic rendering rules place it.

  This pattern is standard across Indic keyboards (Devanagari, Tamil, Bengali,
  etc.). Authors define one context rule per pre-base vowel sign, grouped in
  the same KMN group. There is no explicit reordering rule in the KMN source;
  the reordering is inherent to how the Unicode text is rendered.

tests:
  - input: ["K_K", "U+093F"]
    expectedOutput: "िक"
    description: >
      Devanagari: type ka (क U+0915) then i-matra (ि U+093F) — stored as
      i-matra BEFORE consonant (U+093F U+0915) for correct visual rendering
  - input: ["K_K", "U+0BBF"]
    expectedOutput: "ிக"
    description: >
      Tamil: type ka (க U+0B95) then i-matra (ி U+0BBF) — stored as
      i-matra BEFORE consonant (U+0BBF U+0B95)
  - input: ["K_K", "U+09BF"]
    expectedOutput: "িক"
    description: >
      Bengali: type ka (ক U+0995) then i-matra (ি U+09BF) — stored as
      i-matra BEFORE consonant (U+09BF U+0995)

validatedForFamilies: ["Deva", "Taml", "Beng"]
sourceKeyboards:
  - "release/sil/sil_devanagari_phonetic"
  - "release/tamil/tamil99"
  - "release/sil/sil_bengali_national_jatiya"
reviewedBy: "keyboard-studio-content-team"
reviewDate: "2026-06-05"

# ---------------------------------------------------------------------------
# Extended metadata — YAML-only; not part of the TypeScript Pattern interface
# ---------------------------------------------------------------------------

frequency_in_corpus: "3/3 scanned Indic abugida keyboards require pre-base vowel reorder"

provenance:
  - keyboard: "release/c/common_devanagari/source/common_devanagari.kmn"
    note: >
      Common Devanagari keyboard for Hindi. Uses context rules to handle pre-base
      vowels: `any(ConsonG) + 'i' > context U+093F` (line 224). The i-matra
      (U+093F) is the canonical pre-base vowel: typed after the consonant via
      the 'i' key, it's stored after the consonant but rendered visually to the
      left. This is the primary S-09 exemplar cited in spec §7.3.
  - keyboard: "release/tamil/tamil99/source/tamil99.kmn"
    note: >
      Tamil99 standard layout. Tamil has four pre-base vowels: ி (U+0BBF),
      ெ (U+0BC6), ே (U+0BC7), ை (U+0BC8). All four are typed after the consonant
      but rendered to its left using context rules that preserve the consonant and
      append the vowel sign. The rendering engine automatically positions each
      pre-base vowel visually to the left, matching the Unicode canonical order
      for Tamil syllables.
  - keyboard: "release/sil/sil_bengali_national_jatiya/source/sil_bengali_national_jatiya.kmn"
    note: >
      SIL Bengali National/Jatiya keyboard. Bengali i-matra (ি U+09BF) is a
      pre-base vowel sign with identical visual/typing-order inversion as
      Devanagari. Uses a context rule to preserve the consonant and append the
      vowel sign. Confirms the pattern generalises across the Bengali–Devanagari
      abugida family.

demo:
  filled_kmn: |
    c Demo: Devanagari pre-base i-matra reorder using context rules
    c Type any consonant, then 'i' to produce consonant + i-matra (U+093F)
    c The rendering engine displays the i-matra visually to the left of the consonant.

    store(&VERSION) '10.0'
    store(&NAME) 'Indic Pre-Base Vowel Demo'
    store(&TARGETS) 'any'

    store(baseConsonants) 'कखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह'

    begin Unicode > use(main)

    group(main) using keys
    c Pre-base vowel: 'i' key produces U+093F (i-matra)
    c Context rule preserves the consonant and appends the vowel sign
    any(baseConsonants) + 'i' > context U+093F

  sample_keys:
    - keys: ["क", "ि"]
      output: "ि​क"
      note: "ka + i-matra — stored as i-matra then ka (किperceived as कि)"
    - keys: ["ग", "ि"]
      output: "ि​ग"
      note: "ga + i-matra — pre-base reorder applied"
    - keys: ["स", "ि"]
      output: "ि​स"
      note: "sa + i-matra — pre-base reorder applied"

  sample_output: >
    Type any Devanagari consonant key followed by the i-matra (ि).
    The vowel sign will be stored before the consonant in the text buffer,
    which causes the rendering engine to display it visually to the left
    of the consonant — the correct appearance for Devanagari syllables
    such as कि (ka+i), गि (ga+i), सि (sa+i).

skeleton:
  kmn_template: |
    store(baseConsonants) '{{baseConsonants}}'

    begin Unicode > use(main)

    group(main) using keys
    c Pre-base vowel rules (one per vowel sign; repeat as needed)
    {{kmnRules}}

  note: >
    Each rule follows the pattern: `any(baseConsonants) + 'key' > context U+XXXX`
    where 'key' is the keystroke that produces the pre-base vowel, and U+XXXX is
    the Unicode codepoint for the vowel sign. The `context` keyword preserves the
    previously matched consonant and appends the vowel sign. The Indic script
    rendering engine automatically positions pre-base vowels visually to the left
    of the consonant.

  parameters:
    - id: baseConsonants
      description: >
        The consonant characters that pre-base vowels attach to. Provide the
        full consonant inventory of the target script as a plain string so each
        rule fires for every consonant+vowel pair.
        Example for Devanagari: कखगघङचछजझञटठडढणतथदधनपफबभमयरलवशषसह
    - id: kmnRules
      description: >
        One context rule per pre-base vowel. Format:
        any(baseConsonants) + 'keystroke' > context U+XXXX

        Example for Devanagari i-matra:
        any(baseConsonants) + 'i' > context U+093F

        Example for Tamil (four pre-base vowels):
        any(baseConsonants) + 'i' > context U+0BBF
        any(baseConsonants) + 'e' > context U+0BC6
        any(baseConsonants) + 'E' > context U+0BC7
        any(baseConsonants) + 'ai' > context U+0BC8
