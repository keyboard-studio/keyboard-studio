# ---------------------------------------------------------------------------
# Extended metadata — YAML-only; not part of the TypeScript Pattern interface
# ---------------------------------------------------------------------------

frequency_in_corpus: "Rare; only for massive logographic inventories on Windows"

notes_extended: >
  S-12 is a pragmatic choice for logographic keyboards: shipping 100k+ rules
  in a `.kmn` file is infeasible (file size, compilation time, memory). Instead,
  the keyboard is a thin client that calls a DLL installed by the OS or IME vendor.

  **Why S-12 exists:**
  Windows IMEs (Input Method Editors) for Chinese, Japanese, Korean have been
  built for decades. They're optimized, language-aware, and already on most
  Windows systems. Keyman S-12 doesn't reinvent the wheel — it bridges to
  existing IME infrastructure.

  **The tradeoff:**
  - **Pro:** Massive inventories (100k+ characters) become feasible
  - **Pro:** Leverages existing, battle-tested IME code
  - **Con:** Windows-only (no macOS, Linux, mobile, web)
  - **Con:** Requires the DLL to be installed and accessible
  - **Con:** No fallback if the DLL is missing or incompatible
  - **Con:** Harder to debug (DLL behavior is opaque)

  **Common mistakes to avoid:**

  1. **Assuming cross-platform compatibility**
     S-12 only works on Windows. If you need macOS or Linux support, use S-05
     (transliteration with fewer characters) or design a custom cloud-based
     approach (not yet in Keyboard Studio v1).

  2. **Forgetting to ship the DLL**
     If you write a custom DLL, you MUST ship it with the keyboard package
     and document installation steps. If the DLL is missing, the keyboard is
     non-functional.

  3. **Hard-coding absolute DLL paths**
     WRONG: store(DLLFunction) "C:\Program Files\Custom\MyDLL.dll:MyFunc"
     RIGHT: store(DLLFunction) "MyDLL.dll:MyFunc" (Windows searches PATH)

     Use relative paths or Windows PATH so the DLL can move.

  4. **Not testing on a clean Windows system**
     Test your keyboard on a Windows system where the DLL is NOT installed.
     If it fails silently, users will blame Keyman, not your DLL.

  5. **Not providing fallback input method**
     If your DLL is missing, users are stuck. Consider:
     - Documenting DLL installation clearly
     - Providing an S-05 transliteration fallback
     - Shipping the DLL in the keyboard package
     - Clear error messages when the DLL is missing

  **Testing checklist:**
  Before submitting, verify:
  - [ ] DLL function name is correct (from vendor documentation)
  - [ ] KMN compiles with zero errors
  - [ ] DLL is callable and returns expected output
  - [ ] Tested on a Windows system WITHOUT the DLL installed
  - [ ] Graceful degradation if DLL is missing (error message, not crash)
  - [ ] Platform limitations clearly documented
  - [ ] Installation instructions for any custom DLL included

provenance:
  - keyboard: "release/c/cs_pinyin/source/cs_pinyin.kmn"
    note: >
      Simplified Chinese Pinyin (SIL International). The canonical S-12 exemplar.
      Uses KeymanIMX.DLL:FindGlyph to delegate lookup to a Windows DLL.

      Key insight: the `.kmn` file is minimal (~50 lines of actual rules).
      All intelligence lives in the DLL. The keyboard simply:
      1. Reads user keystrokes (Pinyin romanization)
      2. Calls the DLL with the keystroke sequence
      3. Renders the result (character or selection menu)
      4. User selects the intended character

      This pattern scales to 100k+ Han characters without bloating the KMN file.
      It is the ONLY S-12 implementation in keymanapp/keyboards; treat it as
      the reference.

demo:
  filled_kmn: |
    c DLL IME callout demo: Simplified Chinese Pinyin
    c Minimal implementation; real work happens in the DLL

    store(&VERSION) '10.0'
    store(&NAME) 'Pinyin DLL Demo'
    store(&TARGETS) 'any'

    store(DLLFunction) "KeymanIMX.DLL:FindGlyph"

    begin Unicode > use(main)

    group(main) using keys
    c Call the DLL for any keystroke
    + any(keys) > call(DLLFunction)
    nomatch > call(DLLFunction)

  sample_keys:
    - keys: ["p", "i", "n", "y", "i", "n"]
      output: "[DLL returns matching characters for 'pinyin']"
      note: "User types Pinyin; DLL returns Han characters"
    - keys: ["h", "a", "n", "z", "i"]
      output: "[DLL returns matches for 'hanzi']"
      note: "Another example: Pinyin input → Han output"

  sample_output: >
    Type Pinyin (romanized) keystrokes. The keyboard calls the DLL to look up
    matching Han characters. The DLL returns a selection menu (usually a dropdown
    or candidate list). User selects the intended character, which appears in text.
    The keyboard is a thin bridge; all character lookup is delegated to the DLL.

skeleton:
  kmn_template: |
    c DLL IME callout ({{language}})
    c Minimal shim around {{dllFunctionReference}}

    store(&VERSION) '10.0'
    store(&NAME) '{{keyboardName}}'
    store(&TARGETS) 'any'

    store(DLLFunction) "{{dllFunctionReference}}"

    begin Unicode > use(main)

    group(main) using keys
    c Delegate all input to the DLL
    + any(keys) > call(DLLFunction)
    nomatch > call(DLLFunction)

  note: >
    S-12 is intentionally minimal. The entire keyboard is a client that calls
    a DLL function for every keystroke. The DLL handles all the logic:
    - Phonetic-to-character mapping
    - Character selection UI
    - Candidate ranking
    - User preferences (simplified vs. traditional, etc.)

    You do NOT define character mappings in KMN for S-12. The DLL owns that.

  parameters:
    - id: language
      description: >
        Language name (e.g., "Simplified Chinese", "Japanese").
    - id: dllFunctionReference
      description: >
        DLL function to call. Format: DLL_NAME.DLL:FunctionName
        Example: KeymanIMX.DLL:FindGlyph
    - id: keyboardName
      description: >
        Display name for the keyboard being authored.
        Example: "Pinyin"
