# dll-ime-callout.yaml
# DLL IME callout pattern for logographic scripts
# Strategy: S-12 (DLL IME callout)
# Priority 3 — specialized; logographic-only, Windows-only.

id: dll_ime_callout
title: "DLL IME callout: delegate to Windows IME for massive inventories"
description: >
  For logographic scripts with tens of thousands of characters (Han, Kanji,
  Hanja), the keyboard delegates character lookup to a native Windows IME via
  a DLL function call. Instead of embedding thousands of rules, the keyboard
  acts as a thin shim: user types a phonetic key sequence (Pinyin, Jyutping,
  Romaja), and the DLL (usually installed by the OS or IME vendor) returns the
  matching characters. Keyman rules simply call the DLL and pass through the
  result.
category: ime
appliesTo: ["Hans", "Hant", "Jpan", "Kore"]
priority: 3
group_visibility: all
strategyId: "S-12"
combinesWith: []

questions:
  - id: dllFunctionReference
    prompt: >
      What DLL function will you call to look up characters?
      Format: DLL_NAME.DLL:FunctionName

      Common examples:
        KeymanIMX.DLL:FindGlyph           (for Pinyin → Han, CS Pinyin keyboard)
        MSIMECallback.DLL:GetCharacters   (Microsoft IME callback)
        Custom.DLL:CustomLookup           (custom vendor DLL)

      The DLL must be:
      - Installed on the user's Windows system (or shipped with the keyboard)
      - Accessible to Keyman at runtime
      - Callable with the signature the keyboard expects

      Consult the IME vendor or DLL documentation for the exact function name
      and calling convention (what arguments it accepts, what it returns).
    answerType: text

  - id: inputMappingScheme
    prompt: >
      How does the user input the lookup key? (Pinyin, Jyutping, Romaja, etc.)
      Format: brief description + examples

      Example for Simplified Chinese (Pinyin):
        - User types Pinyin romanization: "han" for 汉, "zi" for 字
        - The keyboard reads the keystroke sequence and passes it to the DLL
        - DLL returns matching Han characters; user selects from list

      Example for Japanese (Romaji):
        - User types Romaji: "ka" for か, "sa" for さ
        - DLL returns kana or kanji matches
        - User selection appears in text

      Describe your input scheme so future authors understand the flow.
    answerType: text

  - id: platformLimitations
    prompt: >
      Are you aware of the platform limitations? (Read carefully!)

      S-12 is WINDOWS-ONLY. It does NOT work on:
      - macOS (no Windows.Media.Sounds equivalent for IME DLLs)
      - Linux (no native Windows DLL support)
      - Mobile (no Keyman DLL mechanism)
      - Web (no DLL access in browsers)

      If you need cross-platform support, S-12 is NOT the right strategy.
      Consider:
      - S-05 (transliteration) if the inventory is <10k characters
      - Cloud-based lookup (not yet in Keyboard Studio v1)
      - Ship multiple platform-specific keyboards

      Do you accept the Windows-only limitation and want to proceed with S-12?
    answerType: text
    required: false

kmnFragment: |
  c DLL IME callout (S-12)
  c User types phonetic input; keyboard calls DLL to look up characters.
  c This is a thin shim around a Windows DLL function.

  store(DLLFunction) "{{dllFunctionReference}}"

  begin Unicode > use(main)

  group(main) using keys
  c For any keystroke, call the DLL to get matching characters
  {{kmnRules}}

  nomatch > use(main)

touchLayoutFragment: null

notes: >
  **When the decision tree picks S-12:**
  The decision tree (spec.md §7.2, rule 1) selects S-12 when:
  - A1 = massive (1000+ new characters) AND
  - A2 = logographic (Han, Kanji, Hanja, etc.)

  This is rare because:
  1. Massive inventories (1000+) are almost always logographic
  2. Logographic scripts almost always need S-12 (no other strategy scales)
  3. S-12 is WINDOWS-ONLY, which is a hard constraint

  **Use S-12 when:**
  - Character inventory is 1000+ (too large for rule-based approaches)
  - Script is logographic (Han, Kanji, Hanja, or similar)
  - A DLL function is available and callable
  - Target platform is Windows
  - User input is phonetic (Pinyin, Jyutping, Romaja, etc.)

  **When to NOT use S-12:**
  - Inventory < 1000 characters → use S-05 (transliteration) instead
  - Cross-platform support needed → S-12 won't work; design differently
  - No DLL available → S-05 is the fallback (slower but portable)
  - Logographic but user input is not phonetic → design a custom strategy

tests:
  - input: ["p", "i", "n", "y", "i", "n"]
    expectedOutput: "汉字" (or selection menu)
    description: >
      Simplified Chinese (Pinyin): typing "pinyin" passes the sequence to the
      DLL, which returns matching Han characters (汉字 for "hanzi"). User sees
      a menu of options and selects the intended character(s).
  - input: ["j", "y", "u", "t", "p", "i", "n", "g"]
    expectedOutput: "香港" (or selection menu)
    description: >
      Traditional Chinese (Jyutping): typing "jyutping" looks up matching
      Traditional Han characters. DLL returns candidates; user picks.
  - input: ["r", "o", "m", "a", "j", "i"]
    expectedOutput: "ローマ字" (or selection menu)
    description: >
      Japanese (Romaji): typing "romaji" returns kana/kanji matches. DLL
      handles the conversion; user selection completes input.

validatedForFamilies: ["Hans"]
