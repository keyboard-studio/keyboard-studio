# script — the v1 keyboard-level facet (spec 036, worked example that proves
# the artifact shape). See specs/036-keyboard-facet-index/data-model.md Entity 1
# (sample) and contracts/facet-definition.schema.md for the authoritative shape.
#
# limits.values note: this is the full set of CONCRETE (histogram-eligible)
# ISO 15924 short codes the pinned UCD 17.0.0 lookup
# (utilities/facet-index/ucd/generated/scriptLookup.ts) can ever emit as a
# `scriptOf`/`scriptExtensionsOf` result — every code appearing in that
# generated file's scriptRanges/scriptExtensionRanges tables, derived from
# Scripts.txt + ScriptExtensions.txt, EXCLUDING the neutral/special codes
# "Zyyy" (Common), "Zinh" (Inherited), and "Zzzz" (Unknown, `scriptOf`'s
# @missing default for an unranged codepoint). Those three are deliberately
# NOT histogram-eligible: the classifier already treats Zyyy/Zinh as neutral
# (script-classifier.ts) and never emits them as a distribution key, and an
# emitted Zzzz would signal a classifier/UCD gap that SHOULD fail the
# build-time limits check (X1) loud rather than validate silently — that
# check is not yet wired (build-index validation lands in Phase 4, T025); this
# list documents the intended enforcement, not a guarantee in force today.
# "Zxxx" (Unwritten) is likewise excluded and is never emitted by the current
# lookup tables.
#
# The lone exception is one reserved non-ISO sentinel: "undetermined". That
# sentinel is required because the fallback chain's last tier
# (utilities/facet-index/fallback.ts) can produce `value: "undetermined"`
# when neither declared metadata nor a langtags default script resolves a
# keyboard's language — with `limits.open: false`, omitting it would make
# that legitimate fallback value fail X1 once that check lands (Phase 4,
# T025). It is the only non-ISO entry in this list; everything else here is a
# real ISO 15924 short code.
#
# On a UCD pin bump (scripts/langtags-version.json-adjacent UCD pin), this
# list MUST be re-reconciled against scriptLookup.ts's emitted code set — a
# lint cross-check for that is deferred to Phase 6 T032.
id: script
title: Output script
description: >
  The script(s) the keyboard actually produces, as an ISO 15924 distribution
  over concretely-scripted output characters (Common/Inherited characters are
  neutral and excluded from the histogram). Falls back to declared .kps
  language metadata, then to the langtags default script for the declared
  language, then to "undetermined" when a keyboard has no scripted output and
  no resolvable language signal at all.
valueType: histogram
