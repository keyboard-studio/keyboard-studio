# casing — corpus counterpart of the session facet source.casing: whether
# the script(s) a keyboard produces have an uppercase/lowercase distinction
# at all.
#
# derivation.archetype note: the classifier derives casing from the keyboard's
# PRODUCED-character script identity (the script the output attests, reused from
# the `script` classifier), so the honest archetype is "character-content" and
# the tier is content-derived — not a declared-metadata read.

id: casing
title: Script casing
description: >
  Whether the script(s) a corpus keyboard produces have an
  uppercase/lowercase distinction (cased), no such distinction (caseless,
  e.g. Arabic, Devanagari), or the keyboard spans both a cased and a
  caseless script (mixed). Derived from the keyboard's script identity,
  independent of its .kmn rule content. Feeds the source.casing session
  facet.
valueType: enum
limits:
  values: [cased, caseless, mixed]
  open: false
likelihoodSemantics: >
  the single classified value for the keyboard's script(s); likelihood is
  1 for the classified value.
derivation:
  archetype: character-content
  classifierId: casing-classifier
  fallbackChain: [content-derived, undetermined]
feedsSessionFacets: [source.casing]
schemaVersion: 1
