# Phase F -- Help documentation authoring (spec §8 step 9)
#
# Scope: the user authors the descriptive content for the keyboard's help page.
#   welcome.htm   -- generated from the template below with the user's answers
#                    substituted for {{pf_*}} placeholders; the BCP47 lang
#                    attribute on the <html> element comes from the Phase A
#                    KeyboardIdentity answer (never asked again here)
#   help/<id>.php -- auto-generated from the same body content as welcome.htm
#                    (spec §8 step 9 parity guarantee)
#
# Excluded from welcome.htm and help/<id>.php (per spec §8 step 9):
#   - version numbers (managed by the scaffolder)
#   - copyright notices (managed by the scaffolder)
#
# The scaffolder always uses the MIT license for keyboard packages submitted to
# keymanapp/keyboards. LICENSE.md and the keyboard package metadata are populated
# automatically — no license question is asked here.

flow_id: phase_f_helpdocs
phase: "F"

questions:

  # -- Keyboard description ----------------------------------------------------

  - id: pf_welcome_paragraph
    prompt: "In 1–3 sentences, what is this keyboard for?"
    help_text: >
      Describe what the keyboard does and who uses it. This text appears at the
      very top of the keyboard's help page, so write it in plain language that
      any user can understand. Avoid technical terms. For example: "This
      keyboard lets you type Bafut (Fa') on any computer. It includes all the
      tone marks and special letters used in the Bafut alphabet."
    type: text
    required: true
    next: pf_usage_tip_1

  # -- Usage tips (up to five; tips 2–5 are optional) --------------------------

  - id: pf_usage_tip_1
    prompt: "What is the most important thing to know when using this keyboard?"
    help_text: >
      Give one short tip, for example how to type a character that is not
      obvious or a key combination for a common accent mark. Keep it to one or
      two sentences. Screenshots can be added to the keyboard package separately
      and do not need to be described here.
    type: text
    required: true
    next: pf_usage_tip_2

  - id: pf_usage_tip_2
    prompt: "Add a second usage tip (optional)"
    help_text: >
      Another short tip about how to use the keyboard. Leave blank if one tip
      is enough.
    type: text
    required: false
    next: pf_usage_tip_3

  - id: pf_usage_tip_3
    prompt: "Add a third usage tip (optional)"
    help_text: >
      Another short tip. Leave blank when done.
    type: text
    required: false
    next: pf_usage_tip_4

  - id: pf_usage_tip_4
    prompt: "Add a fourth usage tip (optional)"
    help_text: >
      Another short tip. Leave blank when done.
    type: text
    required: false
    next: pf_usage_tip_5

  - id: pf_usage_tip_5
    prompt: "Add a fifth usage tip (optional)"
    help_text: >
      Leave blank when done.
    type: text
    required: false
    next: pf_credits

  # -- Credits -----------------------------------------------------------------

  - id: pf_credits
    prompt: "Who should be acknowledged for creating this keyboard?"
    help_text: >
      List the people, organizations, or committees who worked on the keyboard.
      You can include names, roles, or organizations. For example: "Bafut
      Language Committee, Northwest Region, Cameroon. Keyboard layout by the
      Bafut Literacy Project, 2024." This appears in the credits section of
      the help page.
    type: text
    required: true
    next: pf_contact_info

  # -- Contact information -----------------------------------------------------

  - id: pf_contact_info
    prompt: "Is there a public contact for the language community? (optional)"
    help_text: >
      An email address, website, or social media handle where people can reach
      the language community. This appears at the end of the help page so users
      can ask questions or report problems. Leave blank to omit it.
    type: text
    required: false
    next: null

# =============================================================================
# WELCOME.HTM TEMPLATE
# =============================================================================

welcome_htm_template:
  description: >
    Template consumed by the scaffolder to produce welcome.htm.
    {{pf_*}} placeholders match question ids above. Phase A answers
    are accessed via {{phase_a.<questionId>}}. pf_usage_tips is the
    ordered array [pf_usage_tip_1..pf_usage_tip_5] with blank entries
    removed.
  template: |
    <!DOCTYPE html>
    <html lang="{{phase_a.bcp47Tag}}">
    <head>
      <meta charset="utf-8">
      <title>{{phase_a.language_name_english}} Keyboard</title>
    </head>
    <body>
      <h1>{{phase_a.language_name_autonym}} ({{phase_a.language_name_english}}) Keyboard</h1>
      <p>{{pf_welcome_paragraph}}</p>

      <h2>How to use this keyboard</h2>
      <ul>
        {{#each pf_usage_tips}}<li>{{this}}</li>{{/each}}
      </ul>

      {{#if pf_credits}}
      <h2>Credits</h2>
      <p>{{pf_credits}}</p>
      {{/if}}

      {{#if pf_contact_info}}
      <h2>Contact</h2>
      <p>{{pf_contact_info}}</p>
      {{/if}}
    </body>
    </html>
  notes:
    - "pf_usage_tips is the ordered array [pf_usage_tip_1..pf_usage_tip_5] with blank entries removed"
    - "LICENSE.md (MIT) and .kps license metadata are populated by the scaffolder automatically — not asked in this flow"
    - "help/<keyboardId>.php is auto-generated from the same content with identical body (spec §8 step 9 parity guarantee)"
    - "BCP47 lang attr ({{phase_a.bcp47Tag}}) is derived from Phase A KeyboardIdentity, never asked again"
