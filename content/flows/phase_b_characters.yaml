# Phase B -- Character inventory discovery (spec §8 step 4)
#
# Key outputs:
#   computed_axes : a Partial<DiscoveryAxisVector> (packages/contracts). The
#                   labels below (A1/A3/A4/A7) are shorthand for this footer; the
#                   actual TS field names live in axes.ts (DiscoveryAxisVector).
#   computed_axes.A1 : character-count scale
#                      ("tiny" | "small" | "medium" | "large")
#   computed_axes.A3 : phonetic intuition strength
#                      ("strong" | "weak")
#   computed_axes.A4 : diacritic behaviour
#                      ("none" | "stacking-combining" | "replacing-cycling" | "multi-family")
#   computed_axes.A7 : spare-key availability
#                      ("many" | "RAlt only" | "fully booked")
#
# How the footer names map to contract types (these are NOT SurveyPhaseResult
# fields except where noted):
#   eligible_pattern_ids       -- an engine INTERMEDIATE: the gallery candidates
#                                 narrowed by the §7.2 strategy resolution. The
#                                 user's eventual picks become
#                                 SurveyPhaseResult.selectedPatternIds (a
#                                 different, later set).
#   eligible_inventory_entries -- the confirmed InventoryChar[] from
#                                 CharacterDiscoveryService; NOT a field on
#                                 SurveyPhaseResult.
#   The phase emits SurveyPhaseResult { phase: "B", answers: SurveyAnswer[],
#   computedAxes?, selectedPatternIds? }.
#
# Routing context supplied by the engine from Phase A:
#   The engine promotes the Phase A completed-instance footer value
#   `routing_group` (see content/flows/_examples/phase_a_bafut.yaml) into the
#   `ctx.routing_group` namespace before Phase B runs; likewise `script_family`
#   -> `ctx.script_family`. Conditions in this flow read `ctx.*`.
#   {{detected_group}}   -- "qwerty-qwertz" | "azerty" | "non-roman" (= ctx.routing_group)
#   {{script_family}}    -- "indic" | "sea" | "rtl" | "syllabic" | "alpha-nonlatin" | "other"
#                          (non-roman only; engine passes "" for Latin groups)
#   {{language_name}}    -- autonym from Phase A language_name_autonym answer
#
# Discovery methods wired into this flow (spec §8 step 4, characterDiscovery.ts):
#   manual      -- the questions in this flow are the manual on-ramp
#   text-sample -- pb_text_sample (paste a corpus; engine harvests graphemes)
#   linguist    -- pb_linguist_confirm (agent-synthesized inventory for review)
#   picker      -- pb_picker_confirm (visual checkbox grid, always available)
# All four methods feed the SAME confirmed inventory; the strategy selector
# (§7.2) then runs over it as InventoryChar[]. They are complementary.

flow_id: phase_b_characters
phase: "B"

questions:

  # -- Discovery method introduction -------------------------------------------

  - id: pb_discovery_intro
    prompt: "How would you like to tell us which characters your language uses?"
    help_text: >
      There are several ways to build your character list. You can answer the
      questions below one by one, paste a paragraph of text in your language
      so we harvest the characters automatically, confirm a list we suggest
      based on your language, or browse a grid and tick the characters you
      need. All of these feed the same final list -- you can use more than one
      method. Choose your preferred starting point, or pick "Step by step" to
      begin the guided questions.
    type: radio
    required: true
    options:
      - value: manual
        label: "Step by step -- I will answer the questions below"
      - value: text-sample
        label: "Paste a text sample -- we will extract the characters from it"
      - value: linguist
        label: "Show me a suggested list based on my language ({{language_name}})"
      - value: picker
        label: "Browse a character grid and tick what I need"
    next:
      - condition: "value == 'text-sample'"
        goto: pb_text_sample
      - condition: "value == 'linguist'"
        goto: pb_linguist_confirm
      - condition: "value == 'picker'"
        goto: pb_picker_confirm
      - default: pb_routing_branch

  # -- Text-sample on-ramp (DiscoveryMethod: text-sample) ----------------------

  - id: pb_text_sample
    prompt: "Paste a paragraph or more of text written in your language."
    help_text: >
      The longer the text, the better. Anything works: a story, a Bible
      passage, a news article, or even a short sentence. We will find every
      distinct character and build your character list from it. You can still
      review and edit the list after. Please paste at least one full sentence.
    type: text
    required: true
    next: pb_text_sample_review

  - id: pb_text_sample_review
    prompt: "Here are the characters we found in your text. Do you want to continue with this list?"
    help_text: >
      We extracted every distinct character from what you pasted. Characters
      your base keyboard already produces are shown greyed out -- you do not
      need to add those. Tick any you want to keep, untick any that crept in
      by mistake, and add any that are missing. When you are happy, click
      Continue. You can also answer the step-by-step questions afterward to
      fill any gaps.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_routing_branch
      - default: pb_routing_branch

  # -- Linguist inventory on-ramp (DiscoveryMethod: linguist) ------------------

  - id: pb_linguist_confirm
    prompt: "Here is a suggested character list for {{language_name}}. Do you want to use it as your starting point?"
    help_text: >
      We assembled this list from standard language reference sources and
      character databases for your language. Please review it carefully --
      the list may not be perfect for your specific community or orthography.
      Accept it as a starting point, or decline and build your own list using
      the step-by-step questions. You can always add or remove characters
      later.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_routing_branch
      - default: pb_routing_branch

  # -- Visual picker on-ramp (DiscoveryMethod: picker) -------------------------

  - id: pb_picker_confirm
    prompt: "Tick every character your language uses."
    help_text: >
      The grid shows characters common in your script, with characters your
      language is known to use highlighted at the top. Tick each one you need.
      Characters your base keyboard already produces are shown greyed out --
      you can still tick them if you want to confirm them explicitly. When
      done, click Continue. You can combine this with the step-by-step
      questions to catch anything the grid did not include.
    type: multi_select
    options_source: "@picker_candidates_seeded"
    required: false
    next: pb_routing_branch

  # -- Routing branch (engine-resolved; never shown to the user) ---------------
  #
  # This is an engine-resolved node (see content/flows/README.md, the
  # `engine_resolved` field). It is never rendered. The engine evaluates the
  # Phase A routing context (ctx.routing_group) and jumps to the correct
  # inventory branch:
  #   qwerty-qwertz / default -> the Latin inventory chain (pb_standard_letters)
  #   azerty                  -> the Latin inventory chain (pb_standard_letters)
  #   non-roman               -> the non-Roman dispatch (pb_non_roman_branch)
  # The per-layout addenda (spare keys, AZERTY digit row) are appended AFTER the
  # shared universal tail, routed from pb_char_count by ctx.routing_group.

  - id: pb_routing_branch
    engine_resolved: true
    next:
      - condition: "ctx.routing_group == 'non-roman'"
        goto: pb_non_roman_branch
      - default: pb_standard_letters

  # ============================================================================
  # CORE QUESTIONS (script-agnostic; every branch visits these in order)
  # Questions pb_standard_letters through pb_char_count apply to all groups.
  # ============================================================================

  # -- Q1: Standard letters ----------------------------------------------------

  - id: pb_standard_letters
    prompt: "Which best describes the letters your language uses?"
    help_text: >
      Think about the alphabet your language is written in. Pick the option
      that best matches. If you are not sure, pick the closest one and you
      can refine it later.
    type: radio
    required: true
    options:
      - value: basic-az
        label: "Only the basic A to Z letters, no accented or special letters"
      - value: extended-latin
        label: "A to Z plus extra letters with accent marks or special shapes (like é, ñ, or ŋ)"
      - value: other-alphabet
        label: "A completely different alphabet or writing system"
      - value: other
        label: "Something else or I am not sure"
    next:
      - condition: "value == 'other-alphabet'"
        goto: pb_non_roman_branch
      - default: pb_accent_marks_gate

  # -- Q2: Accent/tone marks gate ----------------------------------------------

  - id: pb_accent_marks_gate
    prompt: "Does your language use accent marks or tone marks on letters?"
    help_text: >
      Accent marks are small signs placed above or below a letter that change
      its sound or tone, for example the mark above the e in cafe (é), the
      mark above the n in mañana (ñ), or a tone mark used in tonal languages.
      If your language has any of these, answer Yes.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_diacritic_select
      - default: pb_special_letters

  # -- Q2a: Diacritic grid (multi_select, references diacritics_latin atlas) ---

  - id: pb_diacritic_select
    prompt: "Tick every type of accent or tone mark your language uses."
    help_text: >
      Each item in the list is one type of mark that can be placed on a letter.
      Tick all the ones your language uses. If a mark you need is not listed,
      you can type it in the special-letters question that follows. These accent
      marks are complementary to the visual picker -- both feed the same
      final character list.
    type: multi_select
    required: true
    options:
      - value: "U+0301"
        label: "Acute accent -- slant up-right (e.g. a becomes a with a mark going up to the right, as in café)"
      - value: "U+0300"
        label: "Grave accent -- slant up-left (e.g. a becomes a with a mark going up to the left)"
      - value: "U+0302"
        label: "Circumflex -- hat shape (e.g. a with a small hat above)"
      - value: "U+0303"
        label: "Tilde -- squiggle above (e.g. n with a squiggle above)"
      - value: "U+0304"
        label: "Macron -- straight bar above (marks a long vowel, e.g. in Māori)"
      - value: "U+0306"
        label: "Breve -- short curve above (e.g. short vowel in Romanian)"
      - value: "U+0307"
        label: "Dot above (e.g. in Maltese or Irish)"
      - value: "U+0308"
        label: "Umlaut / diaeresis -- two dots above (e.g. in German: a with two dots)"
      - value: "U+0309"
        label: "Hook above (e.g. Vietnamese falling-rising tone)"
      - value: "U+030A"
        label: "Ring above -- small circle (e.g. Scandinavian a with a ring above)"
      - value: "U+030B"
        label: "Double acute -- two slants (e.g. Hungarian long front rounded vowels)"
      - value: "U+030C"
        label: "Caron / inverted hat (e.g. Czech and Slovak ch, sh, zh sounds)"
      - value: "U+031B"
        label: "Horn -- small hook at top-right (Vietnamese)"
      - value: "U+0323"
        label: "Dot below (e.g. in Yoruba or Igbo)"
      - value: "U+0327"
        label: "Cedilla -- hook below (e.g. French c-cedilla, Turkish s -- NOT for Romanian s/t; use Comma below instead)"
      - value: "U+0328"
        label: "Ogonek -- tail below (e.g. Polish a and e with tails)"
      - value: "U+0326"
        label: "Comma below (e.g. Romanian s and t -- use this, not the cedilla, for modern Romanian)"
      - value: "U+0332"
        label: "Bar / macron below (e.g. some Semitic romanizations)"
      - value: "U+0330"
        label: "Tilde below (e.g. some phonetic systems)"
    next: pb_stacking_marks

  # -- Q2b: Stacking marks (A4 probe) -----------------------------------------

  - id: pb_stacking_marks
    prompt: "Can a single letter carry more than one accent mark at the same time?"
    help_text: >
      In some languages, like Igbo, a vowel letter can carry both a dot mark
      below it and a tone mark above it at the same time -- both marks are
      present on the final character together. If your language ever needs two
      marks on the same base letter simultaneously (not cycling or replacing,
      but both present at once), answer Yes.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_mark_style
      - default: pb_mark_style

  # -- Q2c: Mark style (precomposed vs combining; informs normalization + S-02 vs direct-key, NOT A4) --------------------

  - id: pb_mark_style
    prompt: "When you type a letter with an accent mark, which approach do you prefer?"
    help_text: >
      There are two main ways a keyboard can produce an accented letter. The
      first is to type it as a single ready-made character that already has the
      accent built in -- this is simpler and works in all programs. The second
      is to type the base letter first and then the accent mark separately --
      this is more flexible when ready-made characters do not exist for every
      combination your language needs. Your choice affects which patterns the
      studio will suggest.
    type: radio
    required: true
    options:
      - value: precomposed
        label: "Single ready-made character with the accent already built in (simpler, best when ready-made characters exist for all your combinations)"
      - value: combining
        label: "Base letter followed by a separate accent mark (more flexible when not all combinations exist as ready-made characters)"
      - value: either
        label: "Either way is fine for my language"
    next: pb_capitals_marks

  # -- Q2d: Marks on capitals --------------------------------------------------

  - id: pb_capitals_marks
    prompt: "When you write a capital letter that normally has an accent mark, does the capital letter keep the accent?"
    help_text: >
      In some languages, capital letters always keep their accent marks (for
      example, a capital E with an acute mark). In other languages, accent
      marks are dropped on capitals (for example, French often drops accents on
      capitals). Choose the rule your language community follows.
    type: radio
    required: true
    options:
      - value: keep
        label: "Yes, capital letters keep their accent marks"
      - value: drop
        label: "No, accent marks are dropped on capital letters"
      - value: optional
        label: "It depends or there is no firm rule"
    next: pb_typing_approach

  # -- Q2e: Typing approach (A3 probe) -----------------------------------------

  - id: pb_typing_approach
    prompt: "How would you most naturally type an accented letter on this keyboard?"
    help_text: >
      Think about how you would want the keyboard to behave. Choose the method
      that feels most natural to you. If you are familiar with more than one,
      choose the one you most prefer for this language.
    type: radio
    required: true
    options:
      - value: phonetic
        label: "Type the Latin spelling of the sound -- the keyboard figures out the right letter from the sound it represents"
      - value: lookalike
        label: "Press a key that looks similar to the letter I want -- for example, pressing the N key to get an n-like letter"
      - value: modifier-base
        label: "Hold or press a special key first (like a key you press that makes no letter by itself), then press the base letter"
      - value: direct
        label: "Press one key that directly produces the letter with its accent"
    next: pb_special_letters

  # -- Q3: Special letters not on any standard keyboard -----------------------

  - id: pb_special_letters
    prompt: "Does your language use any special letters that are not found on a standard keyboard?"
    help_text: >
      These are letters with their own distinct shapes that are not just a
      regular letter with an accent added -- for example, the open-e letter
      that looks like a reversed 3 (used in many African languages), the eng
      letter that looks like an n with a descending tail (for the ng sound),
      or a schwa that looks like a rotated e. Answer Yes if your language has
      any letters like this.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_special_letters_list
      - default: pb_punctuation_gate

  - id: pb_special_letters_list
    prompt: "List the special letters your language uses (type them or use the character picker)."
    help_text: >
      Type each letter and its capital form if it has one, separated by spaces.
      For example: ŋ Ŋ ɛ Ɛ ɔ Ɔ ə Ə. If you cannot type a letter, use the
      visual character picker (the grid icon next to this field) -- it is
      seeded with common letters for your language. The picker and this text
      field both feed the same confirmed list. Leave a note in the comments
      below if you are unsure about a specific letter.
    type: text
    required: false
    next: pb_special_letters_notes

  - id: pb_special_letters_notes
    prompt: "Any notes about these special letters? (optional)"
    help_text: >
      For example: which letters have capital forms, which sounds they
      represent, or any uncertainty you have about whether a letter belongs
      in the inventory. Leave blank if there is nothing to add.
    type: text
    required: false
    next: pb_latin_digraphs_gate

  # -- Gap 1: Latin digraphs ---------------------------------------------------

  - id: pb_latin_digraphs_gate
    prompt: "Does your language treat any combination of letters (two or more) as a single sound -- one that you might want on its own dedicated key?"
    help_text: >
      Some languages use multi-letter combinations to spell a single
      sound, such as 'sh', 'ts', 'ny', or 'ng'. If your language treats
      a combination like this as its own unit -- the way English treats
      'ch' or Hausa treats 'sh', or Welsh treats 'ngh' -- it may deserve
      its own key rather than being typed as separate letters. Answer Yes
      if any multi-letter combinations work this way in your language.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_latin_digraphs_list
      - default: pb_punctuation_gate

  - id: pb_latin_digraphs_list
    prompt: "List the letter combinations (digraphs and multigraphs) your language treats as single sounds."
    help_text: >
      Type each letter combination separated by spaces, for example: sh ts ny
      ng ch ngh. Include both lowercase and uppercase forms if the uppercase
      version differs from simply capitalizing each letter. The studio
      uses this to decide whether to give each digraph or multigraph its own key.
    type: text
    required: false
    next: pb_punctuation_gate

  # -- Q4: Punctuation ---------------------------------------------------------

  - id: pb_punctuation_gate
    prompt: "Does your language use any punctuation marks that are not on a standard English keyboard?"
    help_text: >
      Standard English punctuation (period, comma, question mark, quotes, and
      so on) is usually already on the base keyboard. Answer Yes only if your
      language needs punctuation that is not part of standard English, for
      example a special word-separator, a different style of quotation marks,
      or a tonal or sentence-boundary mark.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_punctuation_list
      - default: pb_digit_set

  - id: pb_punctuation_list
    prompt: "Describe or list the punctuation marks your language needs."
    help_text: >
      Type or paste the punctuation marks, or describe them in words if you
      cannot type them. For example: special opening and closing quotation
      marks, a glottal-stop sign, or a word-separator dot. Include any marks
      that stand in for spaces between words or sentences.
    type: text
    required: false
    next: pb_digit_set

  # -- Q5: Digit set -----------------------------------------------------------

  - id: pb_digit_set
    prompt: "Which digits does your language use?"
    help_text: >
      Most languages around the world use the same Western digits 0 through 9.
      Some languages have their own traditional digit shapes (for example,
      Arabic-Indic digits used in Arabic and Persian, Devanagari digits used
      in Hindi). Choose whichever your community uses most, or both if both
      are needed.
    type: radio
    required: true
    options:
      - value: western
        label: "Western digits 0 through 9 (the standard numeric row)"
      - value: native
        label: "Digits in our own script (not the standard 0-9)"
      - value: both
        label: "Both Western digits and our own script digits"
    next: pb_char_count

  # -- Q6: Character count (A1 scale) ------------------------------------------

  - id: pb_char_count
    prompt: "Roughly how many NEW characters does your keyboard need to add, beyond what the base keyboard already has?"
    help_text: >
      Count only characters that are not already on a standard keyboard for
      your layout. Do not count the regular A-Z letters or standard
      punctuation. A rough estimate is fine -- this helps the studio choose
      the right approach for your keyboard. If you answered the questions
      above, think about how many distinct letters and marks you listed.
    type: radio
    required: true
    options:
      - value: tiny
        label: "Fewer than 5 new characters"
      - value: small
        label: "5 to 20 new characters"
      - value: medium
        label: "21 to 100 new characters"
      - value: large
        label: "More than 100 new characters"
    # Layout addenda are appended here, after the shared universal tail.
    # Non-Roman has no Latin-style addenda, so it goes straight to the close.
    next:
      - condition: "ctx.routing_group == 'qwerty-qwertz'"
        goto: pb_latin_qwerty_branch
      - condition: "ctx.routing_group == 'azerty'"
        goto: pb_latin_azerty_branch
      - default: pb_additional_methods

  # ============================================================================
  # LATIN QWERTY/QWERTZ BRANCH
  # Shown when routing_group == "qwerty-qwertz"
  # ============================================================================

  - id: pb_latin_qwerty_branch
    prompt: "When you place an accent mark on a letter, does it always go on the same letter, or can it go on many different letters?"
    help_text: >
      In some languages the same accent mark is used on many different letters
      -- for example, a tone mark that can appear on a, e, i, o, and u. In
      others it only ever appears on one or two letters. This helps the studio
      decide whether to put the mark on its own special key or to use an
      accent key you press first that makes no letter by itself, then the base
      letter.
    type: radio
    required: false
    options:
      - value: many-bases
        label: "The same accent can go on many different letters"
      - value: few-bases
        label: "Each accent only goes on one or two specific letters"
      - value: not-applicable
        label: "My language does not use accents"
    next: pb_spare_keys_qwerty

  - id: pb_spare_keys_qwerty
    prompt: "Are there any standard keys on a QWERTY or QWERTZ keyboard that your language does NOT use?"
    help_text: >
      For example, some African languages do not use the letters X or Q, which
      frees those keys for other characters. Think about whether any of the
      standard letter keys on your keyboard are never needed for your language
      and could be replaced with something more useful. List them below, or
      leave blank if all keys are needed.
    type: text
    required: false
    next: pb_additional_methods

  # ============================================================================
  # LATIN AZERTY BRANCH
  # Shown when routing_group == "azerty"
  # ============================================================================

  - id: pb_latin_azerty_branch
    prompt: "On a standard French AZERTY keyboard, digits require the Shift key (unshifted keys give symbols like & and @). Should your keyboard keep this layout or make digits easier to reach without Shift?"
    help_text: >
      Standard French AZERTY puts special characters on the unshifted number
      row (for example, unshifted 1 gives the & sign) and digits require Shift
      to type. Many African-language keyboards on an AZERTY base change this
      so digits are typed without Shift. Choose whichever you prefer for your
      community.
    type: radio
    required: false
    options:
      - value: keep-french
        label: "Keep the standard French layout (digits need Shift)"
      - value: digits-unshifted
        label: "Make digits available without Shift (symbols moved elsewhere)"
      - value: no-preference
        label: "No strong preference"
    next: pb_azerty_qz_swap

  - id: pb_azerty_qz_swap
    prompt: "Does your language use both the Q sound and the A sound, and both the W sound and the Z sound, as separate letters?"
    help_text: >
      On a French AZERTY keyboard the Q and A keys are swapped compared to
      QWERTY (A is where Q is on QWERTY), and W and Z are also swapped. If
      your language uses both Q and A as separate letters, it may make sense
      to follow QWERTY positions instead. This is a layout decision for your
      community.
    type: radio
    required: false
    options:
      - value: follow-azerty
        label: "Follow AZERTY positions (A where QWERTY has Q, Z where QWERTY has W)"
      - value: follow-qwerty
        label: "Follow QWERTY positions (Q and A in standard QWERTY spots)"
      - value: no-preference
        label: "No preference or not applicable"
    next: pb_spare_keys_azerty

  - id: pb_spare_keys_azerty
    prompt: "Are there any keys on the AZERTY keyboard that your language does not need, and that could be used for extra characters?"
    help_text: >
      For example, some languages do not need the W key or the X key. Freeing
      a key makes it available for a character that would otherwise need to be
      reached with the extra-characters key (the right Alt key). List any keys
      you could spare, or leave blank if all are needed.
    type: text
    required: false
    next: pb_additional_methods

  # ============================================================================
  # NON-ROMAN BRANCH (dispatches further by script_family)
  # ============================================================================

  - id: pb_non_roman_branch
    prompt: "We will ask a few questions about how your writing system works."
    help_text: >
      Non-Roman writing systems have their own rules for how letters are
      shaped and combined. The next questions will help the studio understand
      the structure of your script so it can suggest the right keyboard
      pattern. Answer as well as you can -- if you are not sure, choose the
      closest option and add a note.
    type: radio
    required: false
    options:
      - value: indic
        label: "Indic (South Asian scripts such as Devanagari, Bengali, Tamil, and similar)"
      - value: sea
        label: "Southeast Asian (Thai, Khmer, Myanmar, Lao, and similar)"
      - value: rtl
        label: "Right-to-left (Arabic, Hebrew, and similar)"
      - value: syllabic
        label: "Syllabic (each character represents a syllable, e.g. Cherokee, Canadian Aboriginal Syllabics, Vai)"
      - value: alpha-nonlatin
        label: "Non-Latin alphabet (Cyrillic, Greek, Georgian, Armenian -- letters, not syllables or attached marks)"
      - value: other
        label: "Other or I am not sure"
    next:
      - condition: "value == 'indic'"
        goto: pb_indic_conjuncts
      - condition: "value == 'sea'"
        goto: pb_sea_medials
      - condition: "value == 'rtl'"
        goto: pb_rtl_direction_confirm
      - condition: "value == 'syllabic'"
        goto: pb_syllabic_note
      - condition: "value == 'alpha-nonlatin'"
        goto: pb_special_letters
      - default: pb_other_free_entry

  # ---- Indic sub-branch ------------------------------------------------------

  - id: pb_indic_conjuncts
    prompt: "Does your script join two consonants together into a combined shape when there is no vowel between them?"
    help_text: >
      In many South Asian scripts, when two consonants appear next to each
      other without a vowel between them, the writing system joins them into
      a special combined shape. For example, in Devanagari the letters k and
      sh can combine into a single two-part shape. The keyboard needs a special
      sign that removes the built-in vowel from a consonant to trigger this
      joining. Does your script do this?
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_indic_virama
      - default: pb_indic_vowels_separate

  - id: pb_indic_virama
    prompt: "What is the sign in your script called that removes the inherent vowel from a consonant and can trigger consonant joining?"
    help_text: >
      Most South Asian scripts have a small sign that is placed after a
      consonant to show that the consonant has no vowel following it. In
      Hindi (Devanagari) it looks like a small slanted line under the letter.
      It is also what causes two consonants to join into a combined shape.
      Type the name your community uses for it, or leave blank if you do not
      know the name.
    type: text
    required: false
    next: pb_indic_vowels_separate

  - id: pb_indic_vowels_separate
    prompt: "In your script, are vowels written as separate signs placed on or near the consonant, or are they shown as full letters?"
    help_text: >
      In many South Asian scripts, vowels are shown as small marks attached
      to a consonant rather than as full standing letters. For example, the
      vowel 'i' might appear as a small mark placed to the left or right of a
      consonant. The keyboard needs to know whether your vowels work this way.
    type: radio
    required: true
    options:
      - value: attached-marks
        label: "Vowels are small signs attached to consonants (the usual Indic pattern)"
      - value: full-letters
        label: "Vowels are full standing letters, not attached marks"
      - value: mixed
        label: "Some vowels are attached marks and some are full letters"
    next: pb_indic_pre_base_vowels

  - id: pb_indic_pre_base_vowels
    prompt: "Does your script have any vowel marks that appear to the LEFT of the consonant they belong to?"
    help_text: >
      In Tamil, for example, one of the vowel marks appears to the left of
      the consonant it marks, even though you type it after the consonant.
      The keyboard and your computer handle the display order automatically,
      but the studio needs to know this so it can build the right pattern.
      Answer Yes if any vowel marks in your script appear to the left of
      their consonant in the final display.
    type: bool
    required: true
    next: pb_indic_nukta_gate

  # -- Gap 2: Indic nukta / borrowed-sound markers -----------------------------

  - id: pb_indic_nukta_gate
    prompt: "Does your language use a small dot placed below a consonant letter to spell sounds borrowed from other languages?"
    help_text: >
      Many South Asian scripts include a small dot that can be placed
      directly below a consonant to show that it represents a foreign
      sound not native to the script. In Hindi written in Devanagari,
      this dot is used for sounds borrowed from Arabic and Persian, for
      example the letter for 'q' or sounds used in loanwords. If your
      language uses a dot like this under any letter, answer Yes.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_indic_nukta_detail
      - default: pb_indic_vowels_onset

  - id: pb_indic_nukta_detail
    prompt: "Which consonant letters in your script take the dot-below modifier?"
    help_text: >
      Type or paste the base letters that can have the dot placed beneath
      them, for example the letters used for k, kh, g, j, ph, and f in
      Devanagari Hindi. If you are not sure of the exact set, type the
      ones you know and leave a note. The visual character picker is also
      available.
    type: text
    required: false
    next: pb_indic_vowels_onset

  # -- Gap 3: Indic independent vowels -----------------------------------------

  - id: pb_indic_vowels_onset
    prompt: "When a vowel sound begins a word or syllable with no consonant before it, does your script write it as a full standing letter -- different from the small mark used when the vowel follows a consonant?"
    help_text: >
      In most South Asian scripts, the same vowel sound is written two
      different ways: as a full standing letter when it starts a word,
      but as a small attached mark when it follows a consonant. The
      keyboard needs both forms. Answer Yes if your script works this
      way.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_indic_vowels_onset_list
      - default: pb_special_letters

  - id: pb_indic_vowels_onset_list
    prompt: "List the full standing vowel letters your script uses at the start of a word or syllable."
    help_text: >
      These are the forms your script uses when a vowel begins a word --
      the independent shapes, not the small marks attached to consonants.
      Type or paste them, or use the character picker. For example,
      Devanagari has independent vowel letters for a, aa, i, ii, u, uu,
      e, ai, o, au, and others.
    type: text
    required: false
    # enter the shared universal tail (special letters, punctuation, digits, count)
    next: pb_special_letters

  # ---- SEA sub-branch --------------------------------------------------------

  - id: pb_sea_medials
    prompt: "Does your script use letters that attach to the side of a base consonant to show a combined sound?"
    help_text: >
      In Myanmar (Burmese), for example, certain consonants can appear in a
      smaller form attached to the side of another consonant to represent
      sounds like 'ky', 'py', or 'my'. In Khmer, similar forms appear below
      the base consonant. These attached forms are different from the Indic
      consonant-joining pattern. Does your script have these?
    type: bool
    required: true
    next: pb_sea_stacked_consonants

  - id: pb_sea_stacked_consonants
    prompt: "Does your script stack consonants (place one on top of or below another) to represent consonant clusters?"
    help_text: >
      Some Southeast Asian scripts place consonants in a smaller form below
      the main consonant row when consonants cluster together, for example in
      Khmer where a small connector sign causes the following consonant to
      appear as a smaller form below the base. This is different from the
      side-attachment described in the previous question. Does your script
      do this?
    type: bool
    required: true
    # enter the shared universal tail (special letters, punctuation, digits, count)
    next: pb_special_letters

  # ---- RTL sub-branch --------------------------------------------------------

  - id: pb_rtl_direction_confirm
    prompt: "Can you confirm that your text is written from right to left?"
    help_text: >
      Most right-to-left keyboards, such as those for Arabic and Hebrew, are
      fully right-to-left. Confirming this helps the studio apply the correct
      output pattern. Answer No if your community sometimes writes left-to-right
      even though the script is normally right-to-left.
    type: bool
    required: true
    next: pb_rtl_short_vowels

  - id: pb_rtl_short_vowels
    prompt: "In your language, are the short vowel marks (the small marks above and below consonants) always written, sometimes written, or never written in normal text?"
    help_text: >
      In many right-to-left scripts, the short vowel marks (the small marks
      placed above and below consonant letters to show vowel sounds) are left
      out in everyday text but included in religious, educational, or
      children's materials. In other scripts, they are always written. This
      affects how the keyboard is laid out.
    type: radio
    required: true
    options:
      - value: always
        label: "Always written in normal text"
      - value: sometimes
        label: "Sometimes written (for example, in educational or religious text only)"
      - value: never
        label: "Never or almost never written"
    next: pb_rtl_direction_marks

  # -- Gap 4: RTL direction marks (advisory) -----------------------------------

  - id: pb_rtl_direction_marks
    prompt: "Does your keyboard need to produce special invisible characters to keep numbers or left-to-right words in the correct order inside right-to-left text?"
    help_text: >
      When right-to-left text contains a number, a web address, or a
      word from a left-to-right language, an invisible direction-control
      character sometimes helps the computer display it in the right
      order. These characters are not part of your written language but
      help with mixed-direction text. Most users do not need a dedicated
      key for them. Answer Yes only if your community regularly types
      mixed content where automatic direction handling fails. (Note: the
      studio will configure this in a later step if you answer Yes.)
    type: bool
    required: false
    advisory: true
    next:
      - condition: "value == 'true'"
        goto: pb_rtl_direction_marks_detail
      - default: pb_rtl_special_letters

  - id: pb_rtl_direction_marks_detail
    prompt: "Which direction-control characters do you need? (the studio will place these in a later step)"
    help_text: >
      Select whichever you need. The Right-to-Left Mark forces
      right-to-left reading order on surrounding text; the Left-to-Right
      Mark forces left-to-right reading order. Both are invisible when
      typed. The studio will suggest a key position for these in a later
      step.
    type: multi_select
    required: false
    advisory: true
    options:
      - value: "U+200F"
        label: "Right-to-Left Mark -- forces right-to-left direction on surrounding text"
      - value: "U+200E"
        label: "Left-to-Right Mark -- forces left-to-right direction on surrounding text"
    next: pb_rtl_special_letters

  - id: pb_rtl_special_letters
    prompt: "Does your language use any letters or letter combinations that are specific to your language and not shared with other languages using the same script?"
    help_text: >
      For example, Urdu uses some letter forms that are specific to Urdu and
      are not used in Arabic. Persian has four letters not in Arabic. Some
      languages also require certain combinations of letters to be displayed
      as a single joined shape (a ligature). List any language-specific
      letters or required ligatures here, or leave blank if there are none.
    type: text
    required: false
    # enter the shared universal tail (special letters, punctuation, digits, count)
    next: pb_special_letters

  # ---- Syllabic sub-branch ---------------------------------------------------

  - id: pb_syllabic_note
    prompt: "In your writing system, does each character represent a complete syllable, or do you combine parts (such as a consonant symbol and a vowel symbol) to form a syllable?"
    help_text: >
      Some writing systems give each possible syllable its own distinct
      character that you type with a single keypress (for example, Cherokee
      and Vai). Others let you build a syllable by combining a consonant symbol
      with a vowel symbol (for example, Canadian Aboriginal Syllabics). This
      branch covers Vai, Cherokee, and Canadian Aboriginal Syllabics.
    type: radio
    required: true
    options:
      - value: one-char-per-syllable
        label: "Each syllable has its own distinct character (I do not combine parts)"
      - value: combine-parts
        label: "I combine a consonant symbol and a vowel symbol to form each syllable"
      - value: mixed
        label: "Both -- some syllables have their own character, others are combined"
    next: pb_syllabic_grid

  - id: pb_syllabic_grid
    prompt: "Is your character set organized as a grid where rows are consonants and columns are vowels (or vice versa)?"
    help_text: >
      Many syllabic writing systems have a natural grid structure: each row
      represents a consonant sound and each column represents a vowel sound,
      so the character at row C column V represents the syllable CV. Knowing
      this helps the studio suggest a grid-style keyboard layout. If your
      writing system works differently, choose No.
    type: bool
    required: true
    next: pb_syllabic_finals_gate

  # -- Gap 5: Syllabic final markers -------------------------------------------

  - id: pb_syllabic_finals_gate
    prompt: "Does your writing system use a special mark or a smaller character to show that a syllable ends with a consonant sound?"
    help_text: >
      Some syllabic writing systems have a small raised dot, a raised
      letter form, or another special mark that shows the final consonant
      of a syllable when no vowel follows it. For example, Canadian
      Aboriginal Syllabics uses small raised forms and a centered dot for
      this purpose. If your writing system has any such mark or form,
      answer Yes.
    type: bool
    required: true
    next:
      - condition: "value == 'true'"
        goto: pb_syllabic_finals_detail
      - default: pb_special_letters

  - id: pb_syllabic_finals_detail
    prompt: "Describe or paste the final-consonant marks or small raised forms your writing system uses."
    help_text: >
      Type or paste the marks if you can, or describe them in words (for
      example, 'a small raised dot in the center' or 'a small raised
      version of the plain consonant character'). If there are several --
      one per consonant -- list as many as you can. The visual character
      picker is also available. The studio will use this to decide whether
      these marks need their own key or can be typed through a modifier
      key.
    type: text
    required: false
    # enter the shared universal tail (special letters, punctuation, digits, count)
    next: pb_special_letters

  # ---- Other / fallback sub-branch -------------------------------------------

  - id: pb_other_free_entry
    prompt: "Please list the characters your language needs, or describe your writing system."
    help_text: >
      Type as many characters as you can, or describe your writing system in
      plain words. The visual character picker (the grid icon next to this
      field) is also available and is seeded with characters common in your
      script. All of this feeds the same confirmed character list. There are no
      wrong answers here -- add as much detail as you can and the studio will
      offer its best suggestion.
    type: text
    required: false
    # enter the shared universal tail (special letters, punctuation, digits, count)
    next: pb_special_letters

  # ============================================================================
  # ADDITIONAL METHODS OFFER (shown to all branches)
  # ============================================================================

  - id: pb_additional_methods
    prompt: "Would you like to add characters using any other method before finishing?"
    help_text: >
      You can use more than one method to build your character list. Pasting
      a text sample, reviewing the linguist-suggested list, or browsing the
      character grid can all fill in characters the questions above may have
      missed. All methods feed the same confirmed list. Choose one to continue,
      or choose Done to go straight to review.
    type: radio
    required: false
    options:
      - value: text-sample
        label: "Paste a text sample"
      - value: linguist
        label: "Review the suggested list for {{language_name}}"
      - value: picker
        label: "Browse the character grid"
      - value: done
        label: "Done -- go straight to the review"
    next:
      - condition: "value == 'text-sample'"
        goto: pb_text_sample
      - condition: "value == 'linguist'"
        goto: pb_linguist_confirm
      - condition: "value == 'picker'"
        goto: pb_picker_confirm
      - default: null

# =============================================================================
# ENGINE OUTPUT NOTES (informational -- not parsed by the flow engine)
#
# The engine computes the following from the Phase B answers:
#
# computed_axes:
#   A1 (scale):
#     pb_char_count == "tiny"   -> A1: tiny
#     pb_char_count == "small"  -> A1: small
#     pb_char_count == "medium" -> A1: medium
#     pb_char_count == "large"  -> A1: large
#     # NOTE: A1=massive is not emitted by Phase B (v1). Massive-scale inventories map to
#     # logographic scripts (CJK) excluded from v1 scope per spec §9/§16.
#     # Rule 1 (A1=massive AND A2=logographic → S-12) is unreachable from Phase B output in v1.
#
#   A3 (phonetic intuition):  (§7.1 defines only "strong" | "weak")
#     pb_typing_approach == "phonetic"      -> A3: strong  (type the Latin spelling)
#     pb_typing_approach == "lookalike"     -> A3: weak    (shape-based, not phonetic)
#     pb_typing_approach == "modifier-base" -> A3: weak    (modifier-based, not phonetic)
#     pb_typing_approach == "direct"        -> A3: weak
#
#   A4 (diacritic behaviour):
#     (§7.1: "none" | "stacking-combining" | "replacing-cycling" | "multi-family")
#     pb_accent_marks_gate == "false"               -> A4: none
#     pb_stacking_marks == "true"                   -> A4: stacking-combining
#     two or more distinct mark families selected in pb_diacritic_select
#       (e.g. an above-accent family + a below-dot family)
#                                                   -> A4: multi-family
#     otherwise (a single combining mark family, no stacking)
#                                                   -> A4: stacking-combining
#     Note: A4 "replacing-cycling" (tone marks that cycle on repeated presses,
#     S-07) is NOT elicited by Phase B here; it is set later (Phase C / pattern
#     selection). pb_mark_style (precomposed vs combining) informs OUTPUT
#     normalisation and the S-02-vs-direct-key choice, not the A4 axis value.
#     # TIMING NOTE (A4=replacing-cycling): Phase B emits A4 as one of {none, stacking-combining, multi-family}.
#     # The value 'replacing-cycling' is resolved only during Phase C pattern selection.
#     # TBD (spec §7.2 rule 3 / §8 open question): the engine will need to either re-run the
#     # strategy selector after Phase C confirms A4=replacing-cycling, or treat rule 3
#     # (A4=replacing-cycling → S-07) as a Phase C post-selection step. The §7.2 Mermaid
#     # diagram does not yet model this two-phase path. See spec §7.2 rule 3 and §8.7.
#
#   A7 (spare keys):  (§7.1: "many" | "RAlt only" | "fully booked")
#     A7 is authoritatively computed by the engine from the base-keyboard diff
#     (which physical keys are free). The pb_spare_keys_* answers are advisory:
#       spare keys listed -> hint A7: many
#       none listed       -> defer to the base-keyboard diff
#     The diff distinguishes "many" / "RAlt only" / "fully booked"; the YAML
#     answer cannot, so it never collapses the three-way split on its own.
#
# Strategy resolution per §7.2 decision tree:
#   tiny + A3 strong + A4 none
#     -> primary_strategy: S-01
#        eligible_pattern_ids: patterns with strategyId == "S-01"
#
#   A4 stacking-combining + A1 small/medium  (A3 not required by this rule)
#     -> primary_strategy: S-02, secondary_strategies: [S-04]
#        (§7.2 rule 7: stacking on small/medium inventories; S-04 secondary)
#        eligible_pattern_ids: patterns with strategyId == "S-02", PLUS patterns
#          whose strategyId is in secondary_strategies OR whose combinesWith
#          includes any secondary (the gallery surfaces the union).
#        Note: rule 5 fires BEFORE rule 7. A3 strong + A1 medium/large yields
#          S-05 first; so this path applies at A1 small, and at A1 medium only
#          when A3 is weak.
#
#   A3 strong + A1 medium/large
#     -> primary_strategy: S-05, secondary_strategies: [S-04]
#        eligible_pattern_ids: patterns with strategyId == "S-05"
#
#   replacing/cycling tone marks (A4 replacing-cycling; §7.2 rule 3)
#     -> primary_strategy: S-07
#        eligible_pattern_ids: patterns with strategyId == "S-07"
#        (see the A4 note above: this axis value is set in a later phase)
#
#   A4 multi-family + A1 large  (§7.2 rule 6)
#     -> primary_strategy: S-06, secondary_strategies: [S-04]
#        eligible_pattern_ids: patterns with strategyId == "S-06"
#
#   A7 fully-booked (no spare keys; §7.2 rule 10)
#     -> add S-08 as an additional secondary regardless of primary
#
#   non-roman + indic/sea cluster pattern
#     -> primary_strategy: S-09
#        eligible_pattern_ids: patterns with strategyId == "S-09"
#
# Known §7.5 gaps (do not hard-assert these until resolved):
#   EuroLatin profile (S-06 vs S-02) -- intentional v1.1 gap
#   IPA profile (S-05 vs S-03)       -- intentional v1.1 gap
#
# AXES NOT COMPUTED BY PHASE B:
#   - A2 (script class): set in Phase A from BCP47 + three-group routing (spec §7.1, §9)
#   - A5 (multi-mode): resolved in Phase C gallery pattern selection (spec §8.7)
#   - A6 (constraint enforcement): resolved in Phase C gallery pattern selection (spec §8.7)
#   - A2a (cluster sensitivity): formally resolved in Phase C gallery pattern selection
#     (spec §8.7). pb_indic_conjuncts (answered Yes/No in this phase) is a Phase B
#     pre-signal: Phase C reads it back to confirm cluster sensitivity before
#     finalising A2a. Do not set A2a from pb_indic_conjuncts alone.
#   - A7a (remap posture): not elicited for alpha-nonlatin users. The
#     pb_non_roman_branch -> alpha-nonlatin path routes to pb_special_letters
#     without a remap-posture probe, so §7.2 rule 8 (A7a=full-remap -> S-06+S-04+S-08)
#     cannot fire for Cyrillic/Armenian/Greek users until Phase B adds an
#     alpha-nonlatin remap probe. See spec §7.1 A7a and §7.5 phase-gated elicitation gaps.
#   Phase B contributes A1, A3, A4 (partial -- see TIMING NOTE), A7 (partial -- A7a not
#   elicited for alpha-nonlatin, see above) to the axis vector.
#
# eligible_inventory_entries:
#   Union of all InventoryChar[] from methods used (manual answers converted,
#   text-sample harvest, linguist inventory flattened, picker selections).
#   inBaseOutput computed by diff against chosen base keyboard.
#   method field set per DiscoveryMethod for each character's source.
# =============================================================================
