# Identity-lite — the short head of the hybrid flow (spec §8 "Workflow ordering").
#
# Captures just enough to SUGGEST a base keyboard: the language (autonym + English
# name) and the TARGET SCRIPT. Language and script are DECOUPLED (spec §8/§9): the
# script this keyboard types may be a romanization (Latin) or IPA — not the
# language's default script — so the script is its own question, and the chosen
# script (not the language) drives routing, A2, base suggestion, and the inventory
# diff. The remaining Phase A identity fields (BCP47 refinement, display name,
# copyright) and all provenance are deferred to the documentation stage.
#
# Engine notes:
#   il_target_script values map to a script subtag + optional BCP47 variant:
#     Latn               -> script Latn
#     romanization-Latn  -> script Latn (a Latin romanization of a non-Latin lang)
#     fonipa             -> script Latn, BCP47 variant "fonipa" (IPA, Latin-based)
#     <other subtag>     -> that script subtag
#   See packages/studio/src/lib/scriptAxes.ts (normalizeTargetScript + axis maps).
#   CJK/Ethiopic/Hangul are stub-gated here, consistent with §9 and Phase A.
#
#   il_language_code: the ISO 639 language subtag (e.g. "ha", "fr", "hi"). Region
#   and variant refinement remain deferred to the documentation stage (spec §8
#   Phase A ordering). This field drives the language-match tier in suggestBases()
#   and is intentionally kept to the subtag only — it is NOT a full BCP47 tag.
#   Combined with il_target_script, extractIdentityLite() builds the full
#   IdentityLiteResult.bcp47 field (e.g. "ha-Latn", "hi-Deva").

flow_id: identity_lite
phase: "A"

questions:

  - id: il_language_autonym
    prompt: "What is your language called in your own language?"
    help_text: >
      Type the name your community uses for the language, using your own spelling
      and characters. For example: Fà', Kiswahili, हिन्दी.
    type: text
    required: true
    next: il_language_english

  - id: il_language_english
    prompt: "What is your language called in English?"
    help_text: >
      The English name used in directories and official language lists, for
      example: Bafut, Swahili, Hindi. If your language has no widely-used English
      name, repeat the name you gave above.
    type: text
    required: true
    next: il_language_code

  - id: il_language_code
    prompt: "What is the ISO 639 language subtag for this language?"
    help_text: >
      Enter the two- or three-letter ISO 639 code for your language — the short
      code linguists and software systems use to identify it. Examples: "en"
      (English), "fr" (French), "ha" (Hausa), "hi" (Hindi), "sw" (Swahili),
      "bft" (Balti). Leave blank if you are unsure; you can add it later.
      Note: enter only the language subtag, not a full BCP47 tag with region
      or variant (those are added during the documentation stage).
    type: text
    required: false
    next: il_target_script

  - id: il_target_script
    prompt: "Which script will THIS keyboard type?"
    help_text: >
      Choose the writing system this keyboard produces. It can differ from the
      script your language normally uses: pick "Latin romanization" or "IPA" if
      you are building a romanized or phonetic keyboard. The script you choose
      here — not the language — decides the keyboard's layout family.
    type: select
    options:
      - value: Latn
        label: "Latin (A–Z and accented letters like é, ñ, ŋ)"
      - value: romanization-Latn
        label: "Latin romanization (the keyboard produces Latin letters A–Z and diacritics)"
      - value: fonipa
        label: "IPA — phonetic transcription (Latin-based)"
      - value: Arab
        label: "Arabic"
      - value: Hebr
        label: "Hebrew"
      - value: Deva
        label: "Devanagari (Hindi, Nepali, Marathi, and others)"
      - value: Cyrl
        label: "Cyrillic (Russian, Ukrainian, Serbian, and others)"
      - value: Grek
        label: "Greek"
      - value: Geor
        label: "Georgian"
      - value: Armn
        label: "Armenian"
      - value: Ethi
        label: "Ethiopic (Ge'ez, Amharic, Tigrinya — not yet supported)"
      - value: Hani
        label: "Chinese / Japanese Han characters (not yet supported)"
      - value: Hang
        label: "Hangul (Korean — not yet supported)"
      - value: other
        label: "Another script not listed here"
    required: true
    next:
      - condition: "value == 'Ethi' or value == 'Hani' or value == 'Hang'"
        goto: il_script_not_supported
      - default: null

  # CJK/Ethiopic/Hangul gate — consistent with §9 and the Phase A primary_script
  # stub. Detected here so the user gets an honest "coming soon" exit before base
  # resolution rather than a broken flow.
  - id: il_script_not_supported
    prompt: "This writing system is not supported yet"
    help_text: >
      This version does not yet support Ethiopic, Han (Chinese/Japanese), or
      Hangul keyboards. Hangul needs jamo-to-syllable composition; Ethiopic and
      Han need reorder / IME candidate work — neither is built yet. You can close
      this form for now; nothing you entered will be submitted.
    type: notice
    required: false
    next: null
